<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion Congés et RTT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --bg-a: #f6f2e7;
  --bg-b: #e8f5ff;
  --ink: #0f1f2f;
  --ink-muted: #3f556f;
  --line: #bfd0dd;
  --card: #ffffffcc;
  --accent: #0b7a75;
  --accent-2: #d66a1f;
  --danger: #b83c3c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Space Grotesk", sans-serif;
  color: var(--ink);
  background: radial-gradient(circle at 20% 15%, #fffaf0, var(--bg-a) 35%, var(--bg-b) 100%);
  min-height: 100vh;
}

.bg-shape {
  position: fixed;
  border-radius: 50%;
  z-index: -1;
  filter: blur(10px);
  opacity: 0.28;
}

.bg-shape-a {
  width: 420px;
  height: 420px;
  background: #67b5ff;
  top: -120px;
  left: -110px;
}

.bg-shape-b {
  width: 420px;
  height: 420px;
  background: #ffc067;
  right: -100px;
  bottom: -150px;
}

.app-shell {
  width: min(98vw, 1680px);
  margin: 22px auto;
  display: grid;
  gap: 16px;
}

.app-header,
.card {
  background: var(--card);
  border: 1px solid #ffffff;
  backdrop-filter: blur(8px);
  border-radius: 16px;
  box-shadow: 0 14px 28px #1f402b18;
  padding: 16px;
  animation: rise 420ms ease;
}

.app-status {
  background: #f7fbff;
  border: 1px solid #d6e6f3;
  border-radius: 12px;
  padding: 10px 12px;
  color: #24405f;
  font-size: 0.86rem;
}

.app-status.readonly {
  background: #fff7ea;
  border-color: #f0d19f;
  color: #7b5520;
}

.app-status.error {
  background: #fff1f1;
  border-color: #efc0c0;
  color: #8a3030;
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.eyebrow {
  margin: 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.75rem;
  color: var(--ink-muted);
}

h1,
h2 {
  margin: 4px 0 8px;
}

.subtitle {
  margin: 0;
  color: var(--ink-muted);
}

.toolbar {
  display: flex;
  align-items: end;
  gap: 10px;
  flex-wrap: wrap;
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 14px;
}

label {
  font-size: 0.85rem;
  color: var(--ink-muted);
  display: grid;
  gap: 4px;
}

select,
button {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 8px 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
}

button {
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
  transform: none;
}

button.danger {
  border-color: #e5a2a2;
  color: var(--danger);
}

.legend {
  display: flex;
  flex-wrap: nowrap;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.72rem;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px 8px;
  background: #ffffffcc;
  white-space: nowrap;
}

.legend-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 20px;
  padding: 0 5px;
  border-radius: 5px;
  font-weight: 700;
  color: #fff;
  font-size: 0.68rem;
}

.legend-badge.code-green  { background: #70AD47; }
.legend-badge.code-orange { background: #ED7D31; }
.legend-badge.code-purple { background: #9B59B6; }
.legend-badge.code-blue   { background: #3498DB; }
.legend-badge.code-teal   { background: #1ABC9C; }
.legend-badge.code-red    { background: #FF0000; }
.legend-badge.code-gray   { background: #9E9E9E; }
.legend-badge.code-slate  { background: #78909C; }

.legend-label {
  color: var(--ink);
}

.table-wrap {
  overflow-x: auto;
  overflow-y: visible;
  max-height: none;
  border: 1px solid var(--line);
  border-radius: 12px;
}

.table-wrap.no-scroll {
  overflow: hidden;
  max-height: none;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
  background: #fff;
}

th,
td {
  border: 1px solid #dde8e2;
  padding: 4px 6px;
  font-size: 0.78rem;
  text-align: center;
  white-space: nowrap;
}

th.sticky,
td.sticky {
  position: sticky;
  left: 0;
  z-index: 2;
  background: #f3f8f5;
}

th.sticky-2,
td.sticky-2 {
  position: sticky;
  left: 220px;
  z-index: 2;
  background: #f3f8f5;
}

th.name,
td.name {
  min-width: 220px;
  text-align: left;
}

td.saturday,
th.saturday {
  background: #d9ecff;
}

td.sunday,
th.sunday {
  background: #ffe1e1;
}

td.holiday,
th.holiday {
  background: #ffe8bf;
  box-shadow: inset 0 0 0 1px #f2be63;
}

td.saturday select,
td.sunday select,
td.holiday select {
  background: #f6f7f9;
}

td.day-cell select {
  width: 72px;
  min-width: 72px;
  padding: 3px 4px;
  font-size: 0.72rem;
  border-radius: 6px;
}

.initial-input {
  width: 66px;
  padding: 3px 4px;
  border: 1px solid #c8d8cf;
  border-radius: 6px;
  text-align: right;
}

td.code-green  { background: #70AD47 !important; color: #fff !important; }
td.code-orange { background: #ED7D31 !important; color: #fff !important; }
td.code-purple { background: #9B59B6 !important; color: #fff !important; }
td.code-blue   { background: #3498DB !important; color: #fff !important; }
td.code-teal   { background: #1ABC9C !important; color: #fff !important; }
td.code-red    { background: #FF0000 !important; color: #fff !important; }
td.code-gray   { background: #9E9E9E !important; color: #fff !important; }
td.code-slate  { background: #78909C !important; color: #fff !important; }

.code-chip-half.code-green  { background: #70AD47; color: #fff; }
.code-chip-half.code-orange { background: #ED7D31; color: #fff; }
.code-chip-half.code-purple { background: #9B59B6; color: #fff; }
.code-chip-half.code-blue   { background: #3498DB; color: #fff; }
.code-chip-half.code-teal   { background: #1ABC9C; color: #fff; }
.code-chip-half.code-red    { background: #FF0000; color: #fff; }
.code-chip-half.code-gray   { background: #9E9E9E; color: #fff; }
.code-chip-half.code-slate  { background: #78909C; color: #fff; }

td.code-green select,
td.code-orange select,
td.code-purple select,
td.code-blue select,
td.code-teal select,
td.code-red select,
td.code-gray select,
td.code-slate select {
  background: transparent;
  color: #ffffff;
  font-weight: 700;
  border-color: rgba(255,255,255,0.4);
}

.totals {
  background: #f8fbf9;
  font-weight: 600;
}

tr.team-separator td {
  background: #dce9f7;
  color: #24405f;
  font-weight: 700;
}

tr.team-member.team-n1 td {
  background: #f4faff;
}

tr.team-member.team-n2 td {
  background: #fff7ef;
}

tr.team-member.team-n1.row-odd td {
  background: #e4f1ff;
}
tr.team-member.team-n2.row-odd td {
  background: #ffe3cc;
}

tr.team-member.team-n1 td.saturday,
tr.team-member.team-n1.row-odd td.saturday,
tr.team-member.team-n2 td.saturday,
tr.team-member.team-n2.row-odd td.saturday {
  background: #d9ecff;
}
tr.team-member.team-n1 td.sunday,
tr.team-member.team-n1.row-odd td.sunday,
tr.team-member.team-n2 td.sunday,
tr.team-member.team-n2.row-odd td.sunday {
  background: #ffe1e1;
}
tr.team-member.team-n1 td.holiday,
tr.team-member.team-n1.row-odd td.holiday,
tr.team-member.team-n2 td.holiday,
tr.team-member.team-n2.row-odd td.holiday {
  background: #ffe8bf;
  box-shadow: inset 0 0 0 1px #f2be63;
}

tr.team-member.team-n1 td.sticky,
tr.team-member.team-n1 td.sticky-2 {
  background: #dff0ff;
}

tr.team-member.team-n2 td.sticky,
tr.team-member.team-n2 td.sticky-2 {
  background: #ffe8d2;
}

tr.team-member.team-n1.row-odd td.sticky,
tr.team-member.team-n1.row-odd td.sticky-2 {
  background: #cce6ff;
}
tr.team-member.team-n2.row-odd td.sticky,
tr.team-member.team-n2.row-odd td.sticky-2 {
  background: #ffd8bb;
}

tr.presence-row td {
  background: #edf4ff;
  font-weight: 700;
  color: #1f4877;
}

tr.presence-row td.saturday {
  background: #d4e8ff;
  color: #244f7d;
}

tr.presence-row td.sunday {
  background: #ffd8d8;
  color: #7a2f2f;
}

tr.presence-row td.holiday {
  background: #ffe3b5;
  color: #6e4a08;
}

td.presence-cell.presence-end {
  background: #f6f9fd;
}

#planningTable.compact th,
#planningTable.compact td {
  padding: 1px 2px;
  font-size: 0.68rem;
}

#planningTable.compact th.name,
#planningTable.compact td.name {
  width: 145px;
  min-width: 145px;
  max-width: 145px;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: left;
  padding-left: 6px;
}

#planningTable.compact th.sticky-2,
#planningTable.compact td.sticky-2 {
  left: 145px;
  width: 30px;
  min-width: 30px;
}

#planningTable.compact th:not(.name):not(.sticky-2),
#planningTable.compact td:not(.name):not(.sticky-2) {
  width: 28px;
  min-width: 28px;
  max-width: 28px;
}

.code-chip {
  display: block;
  width: 100%;
  font-size: 0.6rem;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  color: inherit;
  white-space: nowrap;
  overflow: hidden;
}

td.day-cell {
  padding: 1px !important;
  line-height: 1;
  position: relative;
  overflow: hidden;
  height: 20px;
}

td.day-cell.half-day {
  padding: 0 !important;
}

.code-chip-half {
  position: absolute;
  left: 0;
  right: 0;
  height: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: 700;
  line-height: 1;
  color: inherit;
  white-space: nowrap;
  overflow: hidden;
}

.code-chip-half.top {
  top: 0;
  border-bottom: 1px solid rgba(0, 0, 0, 0.25);
}

.code-chip-half.bottom {
  bottom: 0;
}

.code-picker {
  position: absolute;
  z-index: 9999;
  background: #fff;
  border: 1px solid #bcd;
  border-radius: 10px;
  box-shadow: 0 8px 24px #00000033;
  display: block;
  gap: 6px;
  padding: 8px;
  min-width: 280px;
}

.picker-duration {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}

.picker-duration-btn {
  border-radius: 6px;
  padding: 5px 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: 1px solid #c9d7e6;
  background: #f3f7fc;
  color: #274563;
}

.picker-duration-btn.active {
  background: #1e496b;
  color: #fff;
  border-color: #1e496b;
}

.picker-types {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
}

.picker-opt {
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: 1px solid #dde8e2;
  background: #f8fbf9;
  color: var(--ink);
  transition: transform 80ms;
}

.picker-opt-clear {
  background: #f3f6f8;
  border-color: #cfdae1;
  color: #30495e;
}

.picker-opt:hover {
  transform: scale(1.08);
}

.picker-opt.code-green  { background: #70AD47; color: #fff; border-color: #5a9035; }
.picker-opt.code-orange { background: #ED7D31; color: #fff; border-color: #c0601c; }
.picker-opt.code-purple { background: #9B59B6; color: #fff; border-color: #7d3e99; }
.picker-opt.code-blue   { background: #3498DB; color: #fff; border-color: #2178b5; }
.picker-opt.code-teal   { background: #1ABC9C; color: #fff; border-color: #149a7e; }
.picker-opt.code-red    { background: #FF0000; color: #fff; border-color: #cc0000; }
.picker-opt.code-gray   { background: #9E9E9E; color: #fff; border-color: #757575; }
.picker-opt.code-slate  { background: #78909C; color: #fff; border-color: #546E7A; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}

.modal-content {
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 600px;
  width: 90vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: modalIn 200ms ease;
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #dde8e2;
}

.modal-header h2 {
  margin: 0;
  font-size: 1.2rem;
}

.modal-close {
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: var(--ink-muted);
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:hover {
  color: var(--ink);
}

.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}

.employee-form {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

.employee-form h3 {
  margin: 0 0 12px 0;
  font-size: 1rem;
}

.employee-form input,
.employee-form select {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
}

.employee-form button {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
  cursor: pointer;
  font-weight: 600;
}

.employee-form button:hover:not(:disabled) {
  transform: translateY(-1px);
}

.employee-form button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.form-buttons {
  display: flex;
  gap: 10px;
}

.form-buttons button {
  flex: 1;
}

.employee-list h3 {
  margin: 0 0 12px 0;
  font-size: 1rem;
}

.employee-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border: 1px solid #dde8e2;
  border-radius: 10px;
  margin-bottom: 8px;
  background: #f8fbf9;
}

.employee-info {
  flex: 1;
}

.employee-name {
  font-weight: 600;
  color: var(--ink);
}

.employee-team {
  font-size: 0.85rem;
  color: var(--ink-muted);
  margin-top: 4px;
}

.employee-actions {
  display: flex;
  gap: 8px;
}

.employee-actions button {
  padding: 6px 12px;
  font-size: 0.85rem;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  cursor: pointer;
  transition: all 80ms;
}

.employee-actions button:hover {
  transform: translateY(-1px);
}

.employee-actions button.delete {
  color: var(--danger);
  border-color: #e5a2a2;
}

hr {
  border: none;
  border-top: 1px solid #dde8e2;
  margin: 20px 0;
}

@media (max-width: 900px) {
  .app-shell {
    width: min(100vw, 1680px);
    margin: 10px auto;
    padding: 0 8px;
  }

  .app-header {
    flex-direction: column;
    align-items: flex-start;
  }

  th,
  td {
    font-size: 0.72rem;
    padding: 3px 4px;
  }
}
    </style>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Planning équipe</p>
          <h1>Gestion Congés / RTT</h1>
          <p class="subtitle">Période Juin 2026 -> Mai 2027</p>
        </div>
        <div class="toolbar">
          <label>
            Mois
            <select id="monthSelect"></select>
          </label>
          <button id="manageEmployeesBtn" type="button">Gérer collaborateurs</button>
          <button id="exportCsvBtn" type="button">Exporter CSV</button>
          <button id="clearMonthBtn" type="button" class="danger">Vider le mois</button>
        </div>
      </header>

      <section id="appStatus" class="app-status"></section>

      <section class="legend" id="legend"></section>

      <section class="card">
        <h2>Planning mensuel</h2>
        <div class="table-wrap">
          <table id="planningTable"></table>
        </div>
      </section>

      <section class="card">
        <h2>Récap annuel</h2>
        <div class="table-wrap no-scroll">
          <table id="annualTable"></table>
        </div>
      </section>
    </main>

    <div id="codePicker" class="code-picker" style="display:none"></div>

    <!-- Modal gestion collaborateurs -->
    <div id="employeeModal" class="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Gérer les collaborateurs</h2>
          <button type="button" class="modal-close" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="employee-form">
            <h3>Ajouter / Modifier</h3>
            <input type="text" id="employeeName" placeholder="Nom" />
            <select id="employeeTeam">
              <option value="N1">Support N1</option>
              <option value="N2">Support N2</option>
            </select>
            <button id="addEmployeeBtn" type="button">Ajouter</button>
            <button id="updateEmployeeBtn" type="button" style="display:none">Modifier</button>
            <button id="cancelEditBtn" type="button" style="display:none">Annuler</button>
          </div>
          <hr />
          <div class="employee-list">
            <h3>Collaborateurs</h3>
            <div id="employeeListContainer"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
const STORAGE_KEY = "gestion-conges-v1";
const SHARED_CACHE_KEY = "gestion-conges-shared-cache-v1";

// ── Configuration JSONbin.io ──────────────────────────────────────────────────
// 1. Créez un compte gratuit sur https://jsonbin.io
// 2. Créez un bin (New Bin) avec comme contenu initial : {"state":null} → Create
// 3. Copiez l'ID du bin (ex: 6638a1f1ad19ca34f8a12345) dans JSONBIN_BIN_ID
// 4. Dans Account > API Keys :
//    - Copiez le Master Key  → sera la clé éditeur passée via ?key=...
//    - Créez un Access Key   → mettez-le dans JSONBIN_ACCESS_KEY (lecture seule)
const JSONBIN_BIN_ID     = "69f9ec02856a682189abd3e2"; // ← Bin ID
const JSONBIN_ACCESS_KEY = "$2a$10$ZBhZnz4ly/b06u2KC8ly3uJalID..HIv8ac/qqwj7/4PnTzm1dfjS"; // ← Access Key (lecture seule, visible dans l'app)

const monthDefs = [
  { key: "2026-06", label: "Juin 2026" },
  { key: "2026-07", label: "Juillet 2026" },
  { key: "2026-08", label: "Août 2026" },
  { key: "2026-09", label: "Septembre 2026" },
  { key: "2026-10", label: "Octobre 2026" },
  { key: "2026-11", label: "Novembre 2026" },
  { key: "2026-12", label: "Décembre 2026" },
  { key: "2027-01", label: "Janvier 2027" },

async function bootstrapDataProvider() {
  loadEmployeesFromStorage();

  const cachedSharedState = loadCachedSharedState();
  if (cachedSharedState) {
    state = cachedSharedState;
    appContext.statusTone = "";
    appContext.statusMessage = "Chargement des données partagées...";
    syncUiState();
    renderPlanning();
    renderAnnual();
  }

  try {
    appContext.provider = await createDataProvider();
    appContext.mode = appContext.provider.mode;
    appContext.canEdit = appContext.provider.canEdit;
    appContext.currentUser = appContext.provider.currentUser || "";
    state = await appContext.provider.loadState();
    appContext.baseState = cloneState(state);
    saveCachedSharedState(state);

    if (appContext.provider.mode === "jsonbin") {
      appContext.statusTone = "";
      if (appContext.canEdit) {
        appContext.statusMessage = "Mode collaboratif actif (ÉDITEUR). Vos modifications sont partagées immédiatement.";
      } else {
        appContext.statusTone = "readonly";
        appContext.statusMessage = "Mode collaboratif actif (LECTEUR). Consultation seule. Données rafraîchies au chargement et au retour sur l'onglet.";
      }
    } else {
      appContext.statusTone = "";
      appContext.statusMessage = "Mode local actif. Les données restent dans ce navigateur uniquement.";
    }
  } catch (error) {
    console.error("Initialisation impossible", error);
    appContext.provider = createLocalProvider();
    appContext.mode = "local";
    appContext.canEdit = true;
    state = await appContext.provider.loadState();
    appContext.statusTone = "error";
    appContext.statusMessage = "Echec de la connexion au stockage partagé. Les données restent locales dans ce navigateur.";
  }

  syncUiState();
  renderPlanning();
  renderAnnual();
}

function sortEmployeesByTeamAndFirstName() {
  const n1 = employees.filter((e) => e.team === "N1");
  const n2 = employees.filter((e) => e.team === "N2");

  const n1Pinned = ["Jean-Marie Da Silva", "Julien Baud", "Ludovic Rodriguez"];
  const n2Pinned = ["Geoffray Rolland", "Pascal Raimbault"];

  const n1Pinned_ = n1.filter((e) => n1Pinned.includes(e.name));
  const n1Other = n1
    .filter((e) => !n1Pinned.includes(e.name))
    .sort((a, b) => a.name.split(" ")[0].localeCompare(b.name.split(" ")[0], "fr"));

  const n2Pinned_ = n2.filter((e) => n2Pinned.includes(e.name));
  const n2Other = n2
    .filter((e) => !n2Pinned.includes(e.name))
    .sort((a, b) => a.name.split(" ")[0].localeCompare(b.name.split(" ")[0], "fr"));

  employees.length = 0;
  employees.push(...n1Pinned_, ...n1Other, ...n2Pinned_, ...n2Other);
}

function addOrUpdateEmployee() {
  const name = employeeName.value.trim();
  const team = employeeTeam.value;

  if (!name) {
    alert("Veuillez entrer un nom");
    return;
  }

  if (editingEmployeeIndex >= 0) {
    const oldName = employees[editingEmployeeIndex].name;
    employees[editingEmployeeIndex].name = name;
    employees[editingEmployeeIndex].team = team;

    if (oldName !== name && state.data[oldName]) {
      state.data[name] = state.data[oldName];
      delete state.data[oldName];
      if (state.initialBalances[oldName]) {
        state.initialBalances[name] = state.initialBalances[oldName];
        delete state.initialBalances[oldName];
      }
    }
    editingEmployeeIndex = -1;
  } else {
    const exists = employees.some((e) => e.name === name);
    if (exists) {
      alert("Ce collaborateur existe déjà");
      return;
    }
    employees.push({ name, team });
  }

  sortEmployeesByTeamAndFirstName();
  saveEmployeesToStorage();

  const employeeNames = employees.map((e) => e.name);
  const newState = createEmptyState();
  for (const empName of employeeNames) {
    if (state.data[empName]) {
      newState.data[empName] = { ...state.data[empName] };
    }
    if (state.initialBalances[empName]) {
      newState.initialBalances[empName] = { ...state.initialBalances[empName] };
    }
  }
  state = newState;
  state.employees = employees.map((e) => ({ ...e }));
  void persistSnapshot();

  employeeName.value = "";
  employeeTeam.value = "N1";
  addEmployeeBtn.style.display = "block";
  updateEmployeeBtn.style.display = "none";
  cancelEditBtn.style.display = "none";
  renderEmployeeList();
  renderPlanning();
  renderAnnual();
}

function deleteEmployee(index) {
  const emp = employees[index];
  const isConfirmed = window.confirm(`Êtes-vous sûr de vouloir supprimer ${emp.name} ?`);
  if (!isConfirmed) {
    return;
  }

  const name = emp.name;
  employees.splice(index, 1);
  sortEmployeesByTeamAndFirstName();
  saveEmployeesToStorage();

  if (state.data[name]) {
    delete state.data[name];
  }
  if (state.initialBalances[name]) {
    delete state.initialBalances[name];
  }
  state.employees = employees.map((e) => ({ ...e }));
  void persistSnapshot();

  renderEmployeeList();
  renderPlanning();
  renderAnnual();
}

async function createDataProvider() {
  if (detectJsonbinContext()) {
    try {

async function createJsonbinProvider() {
  const provider = {
    mode: "jsonbin",
    canEdit: !!editorKey,
    currentUser: "",
    async loadState() {
      const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
      const headers = { "X-Bin-Meta": "false", "Cache-Control": "no-cache" };
      if (editorKey) {
        headers["X-Master-Key"] = editorKey;
      } else if (JSONBIN_ACCESS_KEY) {
        headers["X-Access-Key"] = JSONBIN_ACCESS_KEY;
      }
      const response = await fetch(url, { method: "GET", headers, cache: "no-store" });

      if (!response.ok) {
        throw new Error(`JSONbin GET échoué (${response.status})`);
      }

      const payload = await response.json();
      if (!payload?.state) {
        return createEmptyState();
      }
      return ensureStateShape(payload.state);
    },
    async saveSnapshot(nextState) {
      if (!editorKey) {
        appContext.canEdit = false;
        syncUiState();
        throw new Error("Clé d'édition requise pour modifier les données");
      }
      const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
      const response = await fetch(url, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": editorKey
        },
        body: JSON.stringify({ state: nextState })
      });

      if (response.status === 401 || response.status === 403) {
        appContext.canEdit = false;
        syncUiState();
        throw new Error("Clé d'édition invalide : passage en mode lecture seule");
      }

      if (!response.ok) {
        throw new Error(`JSONbin PUT échoué (${response.status})`);
      }
    }
  };

  await provider.loadState();
  return provider;
}

async function persistSnapshot() {
  // Sérialise les écritures pour éviter les races et garantit que chaque PUT
  // est précédé d'un GET frais sur lequel on ré-applique uniquement nos
  // modifications locales (anti-écrasement « last write wins »).
  appContext.pendingPersist = appContext.pendingPersist
    .catch(() => {})
    .then(() => doPersistSnapshot());
  return appContext.pendingPersist;
}

async function doPersistSnapshot() {
  const provider = appContext.provider;
  if (!provider) return;

  // Mode local: pas de fusion nécessaire, on écrit directement.
  if (provider.mode !== "jsonbin") {
    await provider.saveSnapshot(state);
    saveCachedSharedState(state);
    appContext.baseState = cloneState(state);
    return;
  }

  // Mode partagé: GET frais, fusion des modifs locales par-dessus, PUT.
  let remote;
  try {
    remote = await provider.loadState();
  } catch (error) {
    console.warn("GET pré-PUT impossible, envoi sans fusion", error);
    await provider.saveSnapshot(state);
    saveCachedSharedState(state);
    appContext.baseState = cloneState(state);
    return;
  }

  const base = appContext.baseState || cloneState(remote);
  const merged = mergeStates(remote, base, state);

  await provider.saveSnapshot(merged);
  state = merged;
  appContext.baseState = cloneState(merged);
  saveCachedSharedState(state);
  renderPlanning();
  renderAnnual();
}

function cloneState(s) {
  return JSON.parse(JSON.stringify(s));
}

// Fusionne les modifications locales (diff entre `base` et `local`) sur l'état
// `remote` récemment récupéré. Les modifications faites par d'autres éditeurs
// pendant ce temps sur des cellules différentes sont conservées.
function mergeStates(remote, base, local) {
  const result = cloneState(remote);

  // Liste des collaborateurs : si elle a changé localement (ajout / suppression /
  // renommage / changement d'équipe), on adopte la version locale.
  const localEmps = JSON.stringify(local.employees || []);
  const baseEmps = JSON.stringify(base.employees || []);
  if (localEmps !== baseEmps) {
    result.employees = (local.employees || []).map((e) => ({ ...e }));
  }
  const effectiveEmployees = result.employees && result.employees.length > 0
    ? result.employees
    : employees;

  for (const employee of effectiveEmployees) {
    const name = employee.name;
    if (!result.data[name]) result.data[name] = {};
    if (!result.initialBalances[name]) {
      const teamInitial = defaultInitialByTeam[employee.team] || defaultInitialByTeam.N1;
      result.initialBalances[name] = { ...teamInitial };
    }

    // Données journalières
    for (const month of monthDefs) {
      const monthKey = month.key;
      const localMonth = local.data?.[name]?.[monthKey] || {};
      const baseMonth = base.data?.[name]?.[monthKey] || {};
      if (!result.data[name][monthKey]) result.data[name][monthKey] = {};
      const targetMonth = result.data[name][monthKey];

      // Cellules ajoutées ou modifiées localement
      for (const day of Object.keys(localMonth)) {
        if (localMonth[day] !== baseMonth[day]) {
          targetMonth[day] = localMonth[day];
        }
      }
      // Cellules supprimées localement
      for (const day of Object.keys(baseMonth)) {
        if (!(day in localMonth)) {
          delete targetMonth[day];
        }
      }
    }

    // Soldes initiaux
    const localBal = local.initialBalances?.[name];
    const baseBal = base.initialBalances?.[name];
    if (localBal && baseBal) {
      if (!result.initialBalances[name]) result.initialBalances[name] = {};
      for (const key of ["CP", "RTT", "FR", "reliquatCP", "reliquatRTT"]) {
        if (localBal[key] !== baseBal[key]) {
          result.initialBalances[name][key] = localBal[key];
        }
      }
    }
  }

  return result;
}

function startBackgroundSync() {
  if (appContext.provider?.mode !== "jsonbin") {
    return;
  }

  // Pas de polling: les lecteurs récupèrent les données au chargement et
  // à chaque retour sur l'onglet. Les éditeurs n'envoient que des PUT
  // lors de leurs modifications (pas de GET en arrière-plan).
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && !appContext.canEdit) {
      void refreshStateFromSharedStore();
    }
  });
}

async function refreshStateFromSharedStore() {
  if (appContext.provider?.mode !== "jsonbin") {
    return;
  }

  try {
    const next = await appContext.provider.loadState();
    const currentSerialized = JSON.stringify(state);
    const nextSerialized = JSON.stringify(next);
    if (currentSerialized === nextSerialized) {
      appContext.baseState = cloneState(next);
      return;
    }

    state = next;
    appContext.baseState = cloneState(next);
    saveCachedSharedState(state);
    renderPlanning();
    renderAnnual();
  } catch (error) {
    console.warn("Synchronisation JSONbin impossible", error);
  }
}

function resolvePickerCode(baseCode, durationKey) {
  if (!baseCode) {
    return "";
  }

  if (durationKey === "day") {
    return baseCode;
  }

  const halfCodeByBase = {
    CP: { am: "CPm", pm: "CPam" },
    CPp: { am: "CPpm", pm: "CPpam" },
    RTT: { am: "RTTm", pm: "RTTam" },
    RTTp: { am: "RTTpm", pm: "RTTpam" },
    CSS: { am: "CSSm", pm: "CSSam" },
    FAM: { am: "FAMm", pm: "FAMam" },
    FR: { am: "FRm", pm: "FRam" },
    PM: { am: "PMm", pm: "PMam" },
    MAL: { am: "MALm", pm: "MALam" },
    DIV: { am: "DIVm", pm: "DIVam" },
    RC: { am: "RCm", pm: "RCam" }
  };

  const mapping = halfCodeByBase[baseCode];
  if (mapping && mapping[durationKey]) {
    return mapping[durationKey];
  }

  return baseCode;
}

function setupPicker() {
  const picker = document.getElementById("codePicker");
  picker.innerHTML = "";

  const durationWrap = document.createElement("div");
  durationWrap.className = "picker-duration";
  picker.dataset.duration = "day";

  for (const option of pickerDurationOptions) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "picker-duration-btn";
    if (option.key === "day") {
      btn.classList.add("active");
    }
    btn.textContent = option.label;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      picker.dataset.duration = option.key;
      durationWrap.querySelectorAll(".picker-duration-btn").forEach((el) => el.classList.remove("active"));
      btn.classList.add("active");
    });
    durationWrap.appendChild(btn);
  }
  picker.appendChild(durationWrap);

  const typeWrap = document.createElement("div");
  typeWrap.className = "picker-types";

  for (const type of pickerAbsenceTypes) {
    const div = document.createElement("button");
    div.type = "button";
    div.className = "picker-opt";
    div.dataset.baseCode = type.baseCode;
    div.textContent = type.label;

    if (!type.baseCode) {
      div.classList.add("picker-opt-clear");
    } else {
      const previewCode = resolvePickerCode(type.baseCode, "day");
      if (codeColorClass[previewCode]) {
        div.classList.add(codeColorClass[previewCode]);
      }
    }

    div.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!appContext.canEdit) {
        closePicker();
        return;
      }
      const empName = picker.dataset.name;
      const day = picker.dataset.day;
      const durationKey = picker.dataset.duration || "day";
      const code = resolvePickerCode(type.baseCode, durationKey);
      if (!code) {
        delete state.data[empName][selectedMonth][day];
      } else {
        state.data[empName][selectedMonth][day] = code;
      }
      void persistSnapshot();
      closePicker();
      renderPlanning();
      renderAnnual();
    });
    typeWrap.appendChild(div);
  }

  picker.appendChild(typeWrap);
}

function openPicker(td, name, day) {
  if (!appContext.canEdit) {
    return;
  }
  const picker = document.getElementById("codePicker");
  picker.dataset.name = name;
  picker.dataset.day = String(day);
  picker.dataset.duration = "day";
  picker.querySelectorAll(".picker-duration-btn").forEach((el) => {
    const isDay = el.textContent === "Journée";
    el.classList.toggle("active", isDay);
  });
  const rect = td.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 2;
  picker.style.display = "block";
  const pw = picker.offsetWidth || 220;
  if (left + pw > window.innerWidth - 8) {
    left = window.innerWidth - pw - 8;
  }
  picker.style.left = left + "px";
  picker.style.top = top + "px";
}

function closePicker() {
  const picker = document.getElementById("codePicker");
  if (picker) picker.style.display = "none";
}

function extractCodeInfo(code) {
  if (!code) return { baseCode: "", duration: "day" };
  
  if (code.endsWith("am")) {
    return { baseCode: code.slice(0, -2), duration: "pm" };
  } else if (code.endsWith("m")) {
    return { baseCode: code.slice(0, -1), duration: "am" };
  }
  return { baseCode: code, duration: "day" };
}

function getDisplayLabel(baseCode) {
  if (baseCode === "CPp") return "CP";
  if (baseCode === "RTTp") return "RTT";
  return baseCode;
}

function renderPlanning() {
  const [yearText, monthText] = selectedMonth.split("-");
  const year = Number(yearText);
  const monthIndex = Number(monthText) - 1;
  const days = getDaysInMonth(year, monthIndex);

  planningTable.innerHTML = "";
  planningTable.classList.add("compact");

  const thead = document.createElement("thead");
  const row1 = document.createElement("tr");
  row1.innerHTML = '<th class="sticky name"></th><th class="sticky-2"></th>';
  for (let day = 1; day <= days; day += 1) {
    const date = new Date(year, monthIndex, day);
    const dayType = getDayType(date);
    row1.innerHTML += `<th class="${dayType.headerClass}" title="${dayType.title}">${weekdayShort[date.getDay()]}</th>`;
  }
  row1.innerHTML += '<th colspan="9"></th>';

  const row2 = document.createElement("tr");
  row2.innerHTML = [
    '<th class="sticky name">Collaborateur</th>',
    '<th class="sticky-2">Équipe</th>'
  ].join("");
  for (let day = 1; day <= days; day += 1) {
    const date = new Date(year, monthIndex, day);
    const dayType = getDayType(date);
    row2.innerHTML += `<th class="${dayType.headerClass}" title="${dayType.title}">${day}</th>`;
  }
  row2.innerHTML += ["<th>CP</th>", "<th>RTT</th>", "<th>FR</th>", "<th>CSS</th>", "<th>FAM</th>", "<th>PM</th>", "<th>MAL</th>", "<th>RC</th>", "<th>DIV</th>"].join("");

  thead.appendChild(row1);
  thead.appendChild(row2);
  planningTable.appendChild(thead);

  const tbody = document.createElement("tbody");

  for (const team of teams) {
    const teamRow = document.createElement("tr");
    teamRow.className = "team-separator";
    teamRow.innerHTML = `<td class="sticky name">-- SUPPORT ${team} --</td><td class="sticky-2"></td><td colspan="${9 + days}"></td>`;
    tbody.appendChild(teamRow);

    const teamMembers = employees.filter((e) => e.team === team);
    for (let empIdx = 0; empIdx < teamMembers.length; empIdx += 1) {
      const employee = teamMembers[empIdx];
      const name = employee.name;
      const tr = document.createElement("tr");
      tr.dataset.employee = name;
      tr.className = `team-member team-${employee.team.toLowerCase()} ${empIdx % 2 === 0 ? "row-even" : "row-odd"}`;

      tr.innerHTML = `
        <td class="sticky name">${name}</td>
        <td class="sticky-2">${employee.team}</td>
      `;

      for (let day = 1; day <= days; day += 1) {
        const date = new Date(year, monthIndex, day);
        const dayType = getDayType(date);
        const td = document.createElement("td");
        td.className = "day-cell";
        if (dayType.isSaturday) td.classList.add("saturday");
        if (dayType.isSunday) td.classList.add("sunday");
        if (dayType.isHoliday) {
          td.classList.add("holiday");
          td.title = dayType.title;
        }

        const current = state.data[name][selectedMonth][String(day)] || "";
        const codeInfo = extractCodeInfo(current);
        const displayLabel = getDisplayLabel(codeInfo.baseCode);
        if (codeInfo.duration === "day" || !current) {
          applyCodeColor(td, current);
          const chip = document.createElement("div");
          chip.className = "code-chip";
          chip.textContent = displayLabel;
          td.appendChild(chip);
        } else {
          applyCodeColor(td, "");
          td.classList.add("half-day");
          const colorClass = codeColorClass[current] || "";
          const topHalf = document.createElement("div");
          topHalf.className = "code-chip-half top";
          if (codeInfo.duration === "am") {
            topHalf.textContent = displayLabel;
            if (colorClass) topHalf.classList.add(colorClass);
          }
          td.appendChild(topHalf);

          const bottomHalf = document.createElement("div");
          bottomHalf.className = "code-chip-half bottom";
          if (codeInfo.duration === "pm") {
            bottomHalf.textContent = displayLabel;
            if (colorClass) bottomHalf.classList.add(colorClass);
          }
          td.appendChild(bottomHalf);
        }

        if (dayType.isWorkingDay) {
          td.addEventListener("click", (e) => {
            e.stopPropagation();
            openPicker(td, name, day);
          });
          td.style.cursor = appContext.canEdit ? "pointer" : "default";
        }
        tr.appendChild(td);
      }

      appendTotalsCells(tr);
      updateTotalsForRow(tr, name);
      tbody.appendChild(tr);
    }

    tbody.appendChild(createPresenceRow(teamMembers, selectedMonth, year, monthIndex, days, `Présents ${team}`));
  }

  tbody.appendChild(createPresenceRow(employees, selectedMonth, year, monthIndex, days, "Présents Global"));

  planningTable.appendChild(tbody);
}

function applyCodeColor(td, code) {
  td.classList.remove("code-green", "code-orange", "code-purple", "code-blue", "code-teal", "code-red", "code-gray", "code-slate");
  if (code && codeColorClass[code]) {
    td.classList.add(codeColorClass[code]);
  }
}

function appendTotalsCells(row) {
  const totals = ["CP", "RTT", "FR", "CSS", "FAM", "PM", "MAL", "RC", "DIV"];
  for (const bucket of totals) {
    const td = document.createElement("td");
    td.className = "totals";
    td.dataset.total = bucket;
    td.textContent = "0";
    row.appendChild(td);
  }
}

function createPresenceRow(members, monthKey, year, monthIndex, days, label) {
  const tr = document.createElement("tr");
  tr.className = "presence-row";
  tr.innerHTML = `<td class="sticky name">${label}</td><td class="sticky-2"></td>`;

  for (let day = 1; day <= days; day += 1) {
    const date = new Date(year, monthIndex, day);
    const dayType = getDayType(date);
    const td = document.createElement("td");
    td.className = "presence-cell";
    if (dayType.isSaturday) td.classList.add("saturday");
    if (dayType.isSunday) td.classList.add("sunday");
    if (dayType.isHoliday) {
      td.classList.add("holiday");
      td.title = dayType.title;
    }

    if (!dayType.isWorkingDay) {
      td.textContent = "-";
    } else {
      let present = 0;
      for (const member of members) {
        const code = state.data[member.name][monthKey][String(day)] || "";
        if (!code) present += 1;
      }
      td.textContent = String(present);
    }
    tr.appendChild(td);
  }

  for (let i = 0; i < 9; i += 1) {
    const td = document.createElement("td");
    td.className = "presence-cell presence-end";
    td.textContent = "";
    tr.appendChild(td);
  }

  return tr;
}

function computeMonthTotals(name, monthKey) {
  const totals = { CP: 0, RTT: 0, CSS: 0, FAM: 0, FR: 0, PM: 0, MAL: 0, RC: 0, DIV: 0 };
  const cells = state.data[name][monthKey];

  for (const value of Object.values(cells)) {
    if (!value || !codeToWeight[value]) continue;
    const weight = codeToWeight[value];
    for (const [bucket, amount] of Object.entries(weight)) {
      totals[bucket] += amount;
    }
  }
  return totals;
}

function updateTotalsForRow(row, name) {
  const totals = computeMonthTotals(name, selectedMonth);
  for (const [bucket, amount] of Object.entries(totals)) {
    const td = row.querySelector(`[data-total="${bucket}"]`);
    if (td) td.textContent = String(amount);
  }
}

function computeAnnualTotals(name) {
  const annual = { CP: 0, RTT: 0, FR: 0, CSS: 0, FAM: 0, PM: 0, MAL: 0, RC: 0, DIV: 0 };
  for (const month of monthDefs) {
    const monthly = computeMonthTotals(name, month.key);
    for (const key of Object.keys(annual)) {
      annual[key] += monthly[key];
    }
  }
  return annual;
}

function renderAnnual() {
  annualTable.innerHTML = "";

  const thead = document.createElement("thead");
  const hr = document.createElement("tr");
  hr.innerHTML = [
    '<th class="sticky name">Collaborateur</th>',
    '<th class="sticky-2">Équipe</th>',
    "<th>Reliquat CP</th>",
    "<th>Reliquat RTT</th>",
    "<th>CP Initial</th>",
    "<th>RTT Initial</th>",
    "<th>FR Initial</th>",
    "<th>CP Restant</th>",
    "<th>RTT Restant</th>",
    "<th>FR Restant</th>",
    "<th>CP</th>",
    "<th>RTT</th>",
    "<th>FR</th>",
    "<th>CSS</th>",
    "<th>FAM</th>",
    "<th>PM</th>",
    "<th>MAL</th>",
    "<th>RC</th>",
    "<th>DIV</th>"
  ].join("");

  thead.appendChild(hr);
  annualTable.appendChild(thead);

  const tbody = document.createElement("tbody");
  for (const team of teams) {
    const teamRow = document.createElement("tr");
    teamRow.className = "team-separator";
    teamRow.innerHTML = '<td class="sticky name">-- SUPPORT ' + team + ' --</td><td class="sticky-2"></td><td colspan="17"></td>';
    tbody.appendChild(teamRow);

    const teamMembers = employees.filter((e) => e.team === team);
    for (let empIdx = 0; empIdx < teamMembers.length; empIdx += 1) {
      const employee = teamMembers[empIdx];
      const name = employee.name;
      const a = computeAnnualTotals(name);
      const initial = state.initialBalances[name];
      const tr = document.createElement("tr");
      tr.className = empIdx % 2 === 0 ? "row-even" : "row-odd";
      const disabledAttr = appContext.canEdit ? "" : "disabled";
      tr.innerHTML = `
        <td class="sticky name">${name}</td>
        <td class="sticky-2">${employee.team}</td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="reliquatCP" data-employee="${name}" value="${initial.reliquatCP}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="reliquatRTT" data-employee="${name}" value="${initial.reliquatRTT}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="CP" data-employee="${name}" value="${initial.CP}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="RTT" data-employee="${name}" value="${initial.RTT}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="FR" data-employee="${name}" value="${initial.FR}" ${disabledAttr}></td>
        <td>${round2(initial.reliquatCP + initial.CP - a.CP)}</td>
        <td>${round2(initial.reliquatRTT + initial.RTT - a.RTT)}</td>
        <td>${round2(initial.FR - a.FR)}</td>
        <td>${a.CP}</td>
        <td>${a.RTT}</td>
        <td>${a.FR}</td>
        <td>${a.CSS}</td>
        <td>${a.FAM}</td>
        <td>${a.PM}</td>
        <td>${a.MAL}</td>
        <td>${a.RC}</td>
        <td>${a.DIV}</td>
      `;

      tr.querySelectorAll("[data-initial]").forEach((input) => {
        input.addEventListener("change", (event) => {
          if (!appContext.canEdit) return;
          const key = event.target.dataset.initial;
          const employeeName = event.target.dataset.employee;
          const parsed = Number(event.target.value);
          state.initialBalances[employeeName][key] = Number.isFinite(parsed) ? parsed : 0;
          void persistSnapshot();
          renderPlanning();
          renderAnnual();
        });
      });

      tbody.appendChild(tr);
    }
  }

  annualTable.appendChild(tbody);
}

function round2(n) {
  return Math.round(n * 100) / 100;
}

function getDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDayType(date) {
  const dow = date.getDay();
  const isSaturday = dow === 6;
  const isSunday = dow === 0;
  const dateKey = getDateKey(date);
  const holidayName = holidays[dateKey] || "";
  const isHoliday = Boolean(holidayName);

  const classes = [];
  if (isSaturday) classes.push("saturday");
  if (isSunday) classes.push("sunday");
  if (isHoliday) classes.push("holiday");

  const titleParts = [];
  if (isSaturday) titleParts.push("Samedi");
  if (isSunday) titleParts.push("Dimanche");
  if (isHoliday) titleParts.push(`Férié: ${holidayName}`);

  return {
    isSaturday,
    isSunday,
    isHoliday,
    isWorkingDay: !isSaturday && !isSunday && !isHoliday,
    headerClass: classes.join(" "),
    title: titleParts.join(" | ")
  };
}

function getDaysInMonth(year, monthIndex) {
  return new Date(year, monthIndex + 1, 0).getDate();
}

function createEmptyState() {
  const data = {};
  const initialBalances = {};
  for (const employee of employees) {
    const name = employee.name;
    const teamInitial = defaultInitialByTeam[employee.team] || defaultInitialByTeam.N1;
    data[name] = {};
    initialBalances[name] = { ...teamInitial };
    for (const month of monthDefs) {
      data[name][month.key] = {};
    }
  }
  return { data, initialBalances, employees: employees.map((e) => ({ ...e })) };
}

function ensureStateShape(input) {
  // Si l'état distant contient une liste de collaborateurs, on l'adopte
  // comme source de vérité avant de construire la structure data/balances.
  if (input && typeof input === "object" && Array.isArray(input.employees) && input.employees.length > 0) {
    const cleaned = input.employees
      .filter((e) => e && typeof e.name === "string" && e.name.trim())
      .map((e) => ({ name: e.name.trim(), team: e.team === "N2" ? "N2" : "N1" }));
    if (cleaned.length > 0) {
      employees.length = 0;
      employees.push(...cleaned);
      sortEmployeesByTeamAndFirstName();
      saveEmployeesToStorage();
    }
  }

  const next = createEmptyState();
  if (!input || typeof input !== "object" || !input.data) {
    return next;
  }

  for (const employee of employees) {
    const name = employee.name;
    if (!input.data[name]) {
      continue;
    }
    for (const month of monthDefs) {
      const monthData = input.data[name][month.key];
      if (!monthData || typeof monthData !== "object") {
        continue;
      }
      next.data[name][month.key] = { ...monthData };
    }

    if (input.initialBalances && input.initialBalances[name]) {
      const src = input.initialBalances[name];
      if (typeof src.CP === "number") {
        next.initialBalances[name].CP = src.CP;
      }
      if (typeof src.reliquatCP === "number") {
        next.initialBalances[name].reliquatCP = src.reliquatCP;
      }
      if (typeof src.reliquatRTT === "number") {
        next.initialBalances[name].reliquatRTT = src.reliquatRTT;
      }
      if (typeof src.RTT === "number") {
        next.initialBalances[name].RTT = src.RTT;
      }
      if (typeof src.FR === "number") {
        next.initialBalances[name].FR = src.FR;
      }
    }
  }
  return next;
}

function renderLegend() {
  legend.innerHTML = "";
  const baseCodes = codes.filter((c) => c.code && !c.code.endsWith("m"));
  for (const entry of baseCodes) {
    const item = document.createElement("div");
    item.className = "legend-item";

    const badge = document.createElement("span");
    badge.className = "legend-badge";
    const colorClass = codeColorClass[entry.code];
    if (colorClass) badge.classList.add(colorClass);
    badge.textContent = getDisplayLabel(entry.code);

    const label = document.createElement("span");
    label.className = "legend-label";
    label.textContent = entry.label;

    item.appendChild(badge);
    item.appendChild(label);
    legend.appendChild(item);
  }
}

function renderMonthSelect() {
  monthSelect.innerHTML = "";
  for (const month of monthDefs) {
    const option = document.createElement("option");
    option.value = month.key;
    option.textContent = month.label;
    monthSelect.appendChild(option);
  }
  monthSelect.value = selectedMonth;
}

async function clearCurrentMonth() {
  if (!appContext.canEdit) return;
  const isConfirmed = window.confirm("Confirmer la suppression des codes pour le mois courant ?");
  if (!isConfirmed) return;

  for (const employee of employees) {
    const name = employee.name;
    state.data[name][selectedMonth] = {};
  }
  await persistSnapshot();
  renderPlanning();
  renderAnnual();
}

function exportCurrentMonthToCsv() {
  const [yearText, monthText] = selectedMonth.split("-");
  const year = Number(yearText);
  const monthIndex = Number(monthText) - 1;
  const days = getDaysInMonth(year, monthIndex);

  const headers = ["Collaborateur", "Équipe", "CP Initial", "RTT Initial", "FR Initial"];
  for (let day = 1; day <= days; day += 1) {
    headers.push(String(day));
  }
  headers.push("CP", "RTT", "FR", "CSS", "FAM", "PM", "MAL", "RC", "DIV");

  const rows = [headers];
  for (const employee of employees) {
    const name = employee.name;
    const initial = state.initialBalances[name];
    const totals = computeMonthTotals(name, selectedMonth);
    const row = [name, employee.team, initial.CP, initial.RTT, initial.FR];
    for (let day = 1; day <= days; day += 1) {
      row.push(state.data[name][selectedMonth][String(day)] || "");
    }
    row.push(totals.CP, totals.RTT, totals.FR, totals.CSS, totals.FAM, totals.PM, totals.MAL, totals.RC, totals.DIV);
    rows.push(row);
  }

  const csv = rows
    .map((r) => r.map((v) => `"${String(v).replaceAll('"', '""')}"`).join(";"))
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `planning-${selectedMonth}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
