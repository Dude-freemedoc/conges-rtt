<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des absences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --bg-a: #f6f2e7;
  --bg-b: #e8f5ff;
  --ink: #0f1f2f;
  --ink-muted: #3f556f;
  --line: #bfd0dd;
  --card: #ffffffcc;
  --accent: #0b7a75;
  --accent-2: #d66a1f;
  --danger: #b83c3c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Space Grotesk", sans-serif;
  color: var(--ink);
  background: radial-gradient(circle at 20% 15%, #fffaf0, var(--bg-a) 35%, var(--bg-b) 100%);
  min-height: 100vh;
}

.bg-shape {
  position: fixed;
  border-radius: 50%;
  z-index: -1;
  filter: blur(10px);
  opacity: 0.28;
}

.bg-shape-a {
  width: 420px;
  height: 420px;
  background: #67b5ff;
  top: -120px;
  left: -110px;
}

.bg-shape-b {
  width: 420px;
  height: 420px;
  background: #ffc067;
  right: -100px;
  bottom: -150px;
}

.app-shell {
  width: min(98vw, 1680px);
  margin: 22px auto;
  display: grid;
  gap: 16px;
}

.app-header,
.card {
  background: var(--card);
  border: 1px solid #ffffff;
  backdrop-filter: blur(8px);
  border-radius: 16px;
  box-shadow: 0 14px 28px #1f402b18;
  padding: 16px;
  animation: rise 420ms ease;
}

.app-status {
  background: #f7fbff;
  border: 1px solid #d6e6f3;
  border-radius: 10px;
  padding: 8px 11px;
  color: #24405f;
  font-size: 0.82rem;
}

.app-status.edit {
  background: #edf8f1;
  border-color: #b9dec6;
  color: #1f5c35;
}

.app-status.readonly {
  background: #f1f7ff;
  border-color: #c9dcf3;
  color: #1f4f7a;
}

.app-status.error {
  background: #fff1f1;
  border-color: #efc0c0;
  color: #8a3030;
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1,
h2 {
  margin: 4px 0 8px;
}

h1 {
  font-size: 1.28em;
}

.card-header-with-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.card-header-with-controls h2 {
  margin: 0;
  flex: 1;
}

.month-selector {
  font-size: 0.85rem;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.month-selector select {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 8px 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
}

.subtitle {
  margin: 0;
  color: var(--ink-muted);
}

.header-identity {
  display: flex;
  align-items: baseline;
  gap: 12px;
  min-width: 0;
  flex: 1;
}

.header-identity h1,
.header-identity .subtitle {
  margin: 0;
  white-space: nowrap;
}

.header-identity .subtitle {
  font-size: 0.95rem;
}

.selection-group {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0;
  border: 0;
  border-radius: 0;
  background: transparent;
}

.selection-group-label {
  font-size: 0.85rem;
  color: var(--ink-muted);
  text-transform: none;
  letter-spacing: normal;
  font-weight: 400;
  white-space: nowrap;
}

.selection-buttons {
  display: flex;
  gap: 8px;
}

.selection-buttons button {
  padding: 7px 12px;
  font-size: 0.78rem;
  border-radius: 8px;
  border: 1px solid #cfdcd4;
  background: #fff;
  color: var(--ink);
  cursor: pointer;
  font-weight: 600;
  min-height: 34px;
  transition: all 80ms;
}

.selection-buttons button:hover:not(:disabled) {
  transform: translateY(-1px);
  background: #f4f8f6;
}

.selection-buttons button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.selection-buttons button.active-toggle {
  background: #e7f4eb;
  color: #1f5c35;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
}

.toolbar #manageEmployeesBtn {
  min-height: 34px;
  padding: 7px 12px;
  border-color: #cfdcd4;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-header .app-status {
  width: fit-content;
  max-width: min(100%, 620px);
}

.app-header {
  display: block;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
}

label {
  font-size: 0.85rem;
  color: var(--ink-muted);
  display: grid;
  gap: 4px;
}

select,
button {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 8px 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
}

button {
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
  transform: none;
}

button.danger {
  border-color: #e5a2a2;
  color: var(--danger);
}

button.active-toggle {
  border-color: #7aa987;
  background: #eaf6ed;
}

.legend {
  display: flex;
  flex-wrap: nowrap;
  justify-content: space-between;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 12px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.72rem;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px 8px;
  background: #ffffffcc;
  white-space: nowrap;
}

.legend-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 20px;
  padding: 0 5px;
  border-radius: 5px;
  font-weight: 700;
  color: #fff;
  font-size: 0.68rem;
}

.legend-badge.code-green  { background: #70AD47; }
.legend-badge.code-orange { background: #ED7D31; }
.legend-badge.code-purple { background: #9B59B6; }
.legend-badge.code-blue   { background: #3498DB; }
.legend-badge.code-teal   { background: #1ABC9C; }
.legend-badge.code-red    { background: #FF0000; }
.legend-badge.code-gray   { background: #9E9E9E; }
.legend-badge.code-slate  { background: #78909C; }

.legend-label {
  color: var(--ink);
}

.table-wrap {
  overflow-x: auto;
  overflow-y: visible;
  max-height: none;
  border: 1px solid var(--line);
  border-radius: 12px;
}

.table-wrap.no-scroll {
  overflow: hidden;
  max-height: none;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
  background: #fff;
}

th,
td {
  border: 1px solid #dde8e2;
  padding: 4px 6px;
  font-size: 0.78rem;
  text-align: center;
  white-space: nowrap;
}

th.sticky,
td.sticky {
  position: sticky;
  left: 0;
  z-index: 2;
  background: #f3f8f5;
}

th.sticky-2,
td.sticky-2 {
  position: sticky;
  left: 220px;
  z-index: 2;
  background: #f3f8f5;
}

th.name,
td.name {
  min-width: 220px;
  text-align: left;
}

td.saturday,
th.saturday {
  background: #d9ecff;
}

td.sunday,
th.sunday {
  background: #ffe1e1;
}

td.holiday,
th.holiday {
  background: #dfe4ea;
}

#planningTable th.today-col,
#planningTable td.today-col {
  position: relative;
}

#planningTable thead th.today-col {
  background: #fff3cd !important;
  color: #5b4a15;
  box-shadow: inset 1px 0 0 #e4cf91, inset -1px 0 0 #e4cf91;
}

#planningTable td.today-col {
  background-image: linear-gradient(to bottom, rgba(255, 243, 205, 0.22), rgba(255, 243, 205, 0.22));
  box-shadow: inset 1px 0 0 #e4cf91, inset -1px 0 0 #e4cf91;
}

td.saturday select,
td.sunday select,
td.holiday select {
  background: #f6f7f9;
}

td.day-cell select {
  width: 72px;
  min-width: 72px;
  padding: 3px 4px;
  font-size: 0.72rem;
  border-radius: 6px;
}

.initial-input {
  width: 66px;
  padding: 3px 4px;
  border: 1px solid #c8d8cf;
  border-radius: 6px;
  text-align: right;
}

td.code-green  { background: #70AD47 !important; color: #fff !important; }
td.code-orange { background: #ED7D31 !important; color: #fff !important; }
td.code-purple { background: #9B59B6 !important; color: #fff !important; }
td.code-blue   { background: #3498DB !important; color: #fff !important; }
td.code-teal   { background: #1ABC9C !important; color: #fff !important; }
td.code-red    { background: #FF0000 !important; color: #fff !important; }
td.code-gray   { background: #9E9E9E !important; color: #fff !important; }
td.code-slate  { background: #78909C !important; color: #fff !important; }

.code-chip-half.code-green  { background: #70AD47; color: #fff; }
.code-chip-half.code-orange { background: #ED7D31; color: #fff; }
.code-chip-half.code-purple { background: #9B59B6; color: #fff; }
.code-chip-half.code-blue   { background: #3498DB; color: #fff; }
.code-chip-half.code-teal   { background: #1ABC9C; color: #fff; }
.code-chip-half.code-red    { background: #FF0000; color: #fff; }
.code-chip-half.code-gray   { background: #9E9E9E; color: #fff; }
.code-chip-half.code-slate  { background: #78909C; color: #fff; }

td.code-green select,
td.code-orange select,
td.code-purple select,
td.code-blue select,
td.code-teal select,
td.code-red select,
td.code-gray select,
td.code-slate select {
  background: transparent;
  color: #ffffff;
  font-weight: 700;
  border-color: rgba(255,255,255,0.4);
}

.totals {
  background: #f8fafc;
  font-weight: 600;
}

#planningTable thead th.totals-header {
  background: #f2f4f7;
  color: #344054;
}

tr.team-separator td {
  background: #dce9f7;
  color: #24405f;
  font-weight: 700;
}

tr.team-member.team-n1 td {
  background: #f4faff;
}

tr.team-member.team-n2 td {
  background: #fff7ef;
}

tr.team-member.team-n1.row-odd td {
  background: #e4f1ff;
}
tr.team-member.team-n2.row-odd td {
  background: #ffe3cc;
}

tr.team-member.team-n1 td.saturday,
tr.team-member.team-n1.row-odd td.saturday,
tr.team-member.team-n2 td.saturday,
tr.team-member.team-n2.row-odd td.saturday {
  background: #d9ecff;
}
tr.team-member.team-n1 td.sunday,
tr.team-member.team-n1.row-odd td.sunday,
tr.team-member.team-n2 td.sunday,
tr.team-member.team-n2.row-odd td.sunday {
  background: #ffe1e1;
}
tr.team-member.team-n1 td.holiday,
tr.team-member.team-n1.row-odd td.holiday,
tr.team-member.team-n2 td.holiday,
tr.team-member.team-n2.row-odd td.holiday {
  background: #dfe4ea;
}

tr.team-member.team-n1 td.sticky,
tr.team-member.team-n1 td.sticky-2 {
  background: #dff0ff;
}

tr.team-member.team-n1 td.totals {
  background: #dff0ff;
}

tr.team-member.team-n2 td.sticky,
tr.team-member.team-n2 td.sticky-2 {
  background: #ffe8d2;
}

tr.team-member.team-n2 td.totals {
  background: #ffe8d2;
}

tr.team-member.team-n1.row-odd td.sticky,
tr.team-member.team-n1.row-odd td.sticky-2 {
  background: #cce6ff;
}

tr.team-member.team-n1.row-odd td.totals {
  background: #cce6ff;
}

tr.team-member.team-n2.row-odd td.sticky,
tr.team-member.team-n2.row-odd td.sticky-2 {
  background: #ffd8bb;
}

tr.team-member.team-n2.row-odd td.totals {
  background: #ffd8bb;
}

#annualTable tr.team-member td {
  font-weight: 600;
}

#annualTable thead th {
  background: #f2f4f7;
  color: #344054;
}

#annualTable thead tr th:nth-last-child(-n+9) {
  background: #f2f4f7;
  color: #344054;
}

#annualTable tr.team-member.team-n1 td:nth-last-child(-n+9) {
  background: #dff0ff;
}

#annualTable tr.team-member.team-n2 td:nth-last-child(-n+9) {
  background: #ffe8d2;
}

#annualTable tr.team-member.team-n1.row-odd td:nth-last-child(-n+9) {
  background: #cce6ff;
}

#annualTable tr.team-member.team-n2.row-odd td:nth-last-child(-n+9) {
  background: #ffd8bb;
}

#annualTable tr.annual-total-row td {
  background: #f2f4f7;
  font-weight: 700;
  color: #344054;
}

#planningTable tr.team-member td.sticky,
#planningTable tr.team-member td.sticky-2 {
  font-weight: 600;
}

tr.presence-row td {
  background: #f2f4f7;
  font-weight: 700;
  color: #344054;
}

tr.presence-row td.saturday {
  background: #dcebff;
  color: #344054;
}

tr.presence-row td.sunday {
  background: #ffe2e2;
  color: #344054;
}

tr.presence-row td.holiday {
  background: #dfe4ea;
  color: #344054;
}

td.presence-cell.presence-end {
  background: #f2f4f7;
}

#planningTable.compact th,
#planningTable.compact td {
  padding: 2px 2px;
  font-size: 0.7rem;
}

#planningTable.compact th.week-number {
  font-size: 0.66rem;
  font-weight: 700;
  color: #344054;
  background: #f2f4f7;
}

#planningTable th.week-blank {
  background: #f2f4f7;
}

#planningTable th.week-corner {
  position: sticky;
  left: 0;
  z-index: 3;
}

#planningTable th.week-number.current-week {
  background: #fff3cd !important;
  color: #5b4a15;
  box-shadow: inset 1px 0 0 #e4cf91, inset -1px 0 0 #e4cf91;
}

#planningTable thead th.name,
#planningTable thead th.sticky-2 {
  background: #f2f4f7;
  color: #344054;
}
#planningTable.compact th.name,
#planningTable.compact td.name {
  width: 145px;
  min-width: 145px;
  max-width: 145px;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: left;
  padding-left: 6px;
}

#planningTable.compact th.sticky-2,
#planningTable.compact td.sticky-2 {
  left: 145px;
  width: 30px;
  min-width: 30px;
}

#planningTable.compact th:not(.name):not(.sticky-2),
#planningTable.compact td:not(.name):not(.sticky-2) {
  width: 28px;
  min-width: 28px;
  max-width: 28px;
}

.code-chip {
  display: block;
  width: 100%;
  font-size: 0.64rem;
  font-weight: 700;
  line-height: 22px;
  text-align: center;
  color: inherit;
  white-space: nowrap;
  overflow: hidden;
}

td.day-cell {
  padding: 1px !important;
  line-height: 1;
  position: relative;
  overflow: hidden;
  height: 24px;
}

td.day-cell.half-day {
  padding: 0 !important;
}

td.day-cell.range-preview {
  box-shadow: inset 0 0 0 2px #4f8f65;
}

.code-chip-half {
  position: absolute;
  left: 0;
  right: 0;
  height: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.64rem;
  font-weight: 700;
  line-height: 1;
  color: inherit;
  white-space: nowrap;
  overflow: hidden;
}

.code-chip-half.top {
  top: 0;
  border-bottom: 1px solid rgba(0, 0, 0, 0.25);
}

.code-chip-half.bottom {
  bottom: 0;
}

.code-picker {
  position: absolute;
  z-index: 9999;
  background: #fff;
  border: 1px solid #bcd;
  border-radius: 10px;
  box-shadow: 0 8px 24px #00000033;
  display: block;
  gap: 6px;
  padding: 8px;
  min-width: 280px;
}

.picker-duration {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}

.picker-duration-btn {
  border-radius: 6px;
  padding: 5px 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: 1px solid #c9d7e6;
  background: #f3f7fc;
  color: #274563;
}

.picker-duration-btn.active {
  background: #1e496b;
  color: #fff;
  border-color: #1e496b;
}

.picker-types {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
}

.picker-opt {
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: 1px solid #dde8e2;
  background: #f8fbf9;
  color: var(--ink);
  transition: transform 80ms;
}

.picker-opt-clear {
  background: #f3f6f8;
  border-color: #cfdae1;
  color: #30495e;
}

.picker-opt:hover {
  transform: scale(1.08);
}

.picker-opt.code-green  { background: #70AD47; color: #fff; border-color: #5a9035; }
.picker-opt.code-orange { background: #ED7D31; color: #fff; border-color: #c0601c; }
.picker-opt.code-purple { background: #9B59B6; color: #fff; border-color: #7d3e99; }
.picker-opt.code-blue   { background: #3498DB; color: #fff; border-color: #2178b5; }
.picker-opt.code-teal   { background: #1ABC9C; color: #fff; border-color: #149a7e; }
.picker-opt.code-red    { background: #FF0000; color: #fff; border-color: #cc0000; }
.picker-opt.code-gray   { background: #9E9E9E; color: #fff; border-color: #757575; }
.picker-opt.code-slate  { background: #78909C; color: #fff; border-color: #546E7A; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}

.modal-content {
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 600px;
  width: 90vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: modalIn 200ms ease;
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #dde8e2;
}

.modal-header h2 {
  margin: 0;
  font-size: 1.2rem;
}

.modal-close {
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: var(--ink-muted);
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:hover {
  color: var(--ink);
}

.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}

.employee-form {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

.employee-field {
  display: grid;
  gap: 4px;
  font-size: 0.85rem;
  color: var(--ink-muted);
}

.employee-form h3 {
  margin: 0 0 12px 0;
  font-size: 1rem;
  color: var(--ink);
}

.employee-form select {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 10px;
  background: white;
  color: var(--ink);
}

.employee-form button {
  border-radius: 10px;
  border: 1px solid var(--line);
  padding: 10px;
  font-family: inherit;
  background: white;
  color: var(--ink);
  cursor: pointer;
  font-weight: 600;
}

.employee-form button:hover:not(:disabled) {
  transform: translateY(-1px);
}

.employee-form button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.form-buttons {
  display: flex;
  gap: 10px;
}

async function bootstrapDataProvider() {
  loadEmployeesFromStorage();

  const cachedSharedState = loadCachedSharedState();
  if (cachedSharedState) {
    state = cachedSharedState;
    saveBackupSnapshot(state, "cache partagé");
    appContext.statusTone = "";
    appContext.statusMessage = "Chargement du planning...";
    syncUiState();
    renderPlanning();
    renderAnnual();
  }

  try {
    appContext.provider = await createDataProvider();
    appContext.mode = appContext.provider.mode;
    appContext.canEdit = appContext.provider.canEdit;
    appContext.currentUser = appContext.provider.currentUser || "";
    state = await appContext.provider.loadState();
    appContext.baseState = cloneState(state);
    saveCachedSharedState(state);
    saveBackupSnapshot(state, appContext.provider.mode === "local" ? "chargement local" : "chargement partagé");

    if (appContext.provider.mode === "local") {
      appContext.statusTone = "edit";
      appContext.statusMessage = "Mode local actif. Les données restent sur ce poste uniquement.";
    } else if (appContext.canEdit) {
      appContext.statusTone = "edit";
      appContext.statusMessage = "Planning connecté. Vous pouvez consulter et modifier.";
    } else {
      appContext.statusTone = "readonly";
      appContext.statusMessage = "Planning connecté en lecture seule.";
    }
  } catch (error) {
    console.error("Initialisation impossible", error);
    appContext.provider = createLocalProvider();
    appContext.mode = "local";
    appContext.canEdit = true;
    state = await appContext.provider.loadState();
    appContext.statusTone = "error";
    appContext.statusMessage = "Connexion au planning partagé indisponible. Passage en mode local sur ce poste.";
  }

  syncUiState();
  renderPlanning();
  renderAnnual();

  void maybeMigrateHireDatesToSharedState();
}

async function maybeMigrateHireDatesToSharedState() {
  if (appContext.provider?.mode === "local" || !appContext.canEdit) {
    return;
  }

  const hasAnyHireDate = employees.some((e) => normalizeHireDate(e.hireDate));
  if (!hasAnyHireDate) {
    return;
  }

  let alreadyMigrated = false;
  try {
    alreadyMigrated = localStorage.getItem(HIRE_DATE_MIGRATION_KEY) === "1";
  } catch (e) {
    alreadyMigrated = false;
  }
  if (alreadyMigrated) {
    return;
  }

  state.employees = employees.map((e) => ({ ...e }));
  try {
    await persistSnapshot();
    try {
      localStorage.setItem(HIRE_DATE_MIGRATION_KEY, "1");
    } catch (e) {
      console.warn("Migration hireDate effectuée mais drapeau local non sauvegardé", e);
    }
  } catch (error) {
    console.warn("Migration automatique des dates d'embauche impossible", error);
  }
}

function sortEmployeesByTeamAndFirstName() {
  const n1 = employees.filter((e) => e.team === "N1");
  const n2 = employees.filter((e) => e.team === "N2");

  const n1Pinned = ["Jean-Marie Da Silva", "Julien Baud", "Ludovic Rodriguez"];
  const n2Pinned = ["Geoffray Rolland", "Pascal Raimbault"];

  const n1Pinned_ = n1.filter((e) => n1Pinned.includes(e.name));
  const n1Other = n1
    .filter((e) => !n1Pinned.includes(e.name))
    .sort((a, b) => a.name.split(" ")[0].localeCompare(b.name.split(" ")[0], "fr"));

  const n2Pinned_ = n2.filter((e) => n2Pinned.includes(e.name));
  const n2Other = n2
    .filter((e) => !n2Pinned.includes(e.name))
    .sort((a, b) => a.name.split(" ")[0].localeCompare(b.name.split(" ")[0], "fr"));

  employees.length = 0;
  employees.push(...n1Pinned_, ...n1Other, ...n2Pinned_, ...n2Other);
}

          .filter((e) => e && typeof e.name === "string")
          .map((e) => [e.name, normalizeHireDate(e.hireDate)])
      );
      const cleaned = Array.isArray(loaded)
        ? loaded
            .filter((e) => e && typeof e.name === "string" && e.name.trim())
            .map((e) => ({
              name: e.name.trim(),
              team: e.team === "N2" ? "N2" : "N1",
              hireDate: normalizeHireDate(e.hireDate) || currentHireDateByName.get(e.name.trim()) || ""
            }))
        : [];
      employees.length = 0;
      employees.push(...cleaned);
    }
  } catch (e) {
    console.error("Impossible de charger les collaborateurs", e);
  }
}

function loadCachedSharedState() {
  try {
    const raw = localStorage.getItem(SHARED_CACHE_KEY);
    if (!raw) {
      return loadLatestBackupState();
    }
    return ensureStateShape(JSON.parse(raw));
  } catch (e) {
    console.warn("Cache partagé invalide, réinitialisation", e);
    return loadLatestBackupState();
  }
}

function saveCachedSharedState(nextState) {
  try {
    localStorage.setItem(SHARED_CACHE_KEY, JSON.stringify(nextState));
  } catch (e) {
    console.warn("Impossible de sauvegarder le cache partagé", e);
  }
}

function hasUsableSharedData(input) {
  return Boolean(input && typeof input === "object" && input.data && typeof input.data === "object" && Object.keys(input.data).length > 0);
}

function createBackupStateSnapshot(sourceState) {
  const snapshot = cloneState(sourceState);
  snapshot.backups = [];
  return snapshot;
}

function normalizeBackupEntries(rawBackups) {
  if (!Array.isArray(rawBackups)) {
    return [];
  }

  return rawBackups
    .filter((entry) => entry && typeof entry === "object" && entry.state && typeof entry.state === "object")
    .map((entry) => ({
      ts: typeof entry.ts === "string" ? entry.ts : new Date().toISOString(),
      label: typeof entry.label === "string" && entry.label.trim() ? entry.label.trim() : "sauvegarde",
      state: createBackupStateSnapshot(entry.state)
    }))
    .slice(0, SHARED_BACKUP_LIMIT);
}

function appendSharedBackup(targetState, label) {
  const history = normalizeBackupEntries(targetState.backups);
  history.unshift({
    ts: new Date().toISOString(),
    label: label || "sauvegarde",
    state: createBackupStateSnapshot(targetState)
  });
  targetState.backups = history.slice(0, SHARED_BACKUP_LIMIT);
}

function loadBackupHistory() {
  try {
    const raw = localStorage.getItem(BACKUP_HISTORY_KEY);
    if (!raw) {
      return [];
    }
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    console.warn("Historique de sauvegardes invalide, réinitialisation", e);
    return [];
  }
}

function loadLatestBackupState() {
  const history = loadBackupHistory();
  if (history.length === 0 || !history[0]?.state) {
    return null;
  }
  try {
    return ensureStateShape(history[0].state);
  } catch (e) {
    console.warn("Dernière sauvegarde invalide", e);
    return null;
  }
}

function saveBackupSnapshot(nextState, label) {
  try {
    const history = loadBackupHistory();
    history.unshift({
      ts: new Date().toISOString(),
      label: label || "sauvegarde",
      state: cloneState(nextState)
    });
    localStorage.setItem(BACKUP_HISTORY_KEY, JSON.stringify(history.slice(0, BACKUP_HISTORY_LIMIT)));
  } catch (e) {
    console.warn("Impossible de créer la sauvegarde automatique", e);
  }
}

function loadPendingSupabaseMirror() {
  try {
    const raw = localStorage.getItem(SUPABASE_MIRROR_PENDING_KEY);
    if (!raw) {
      return null;
    }
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || !parsed.state || typeof parsed.state !== "object") {
      return null;
    }
    return {
      ts: typeof parsed.ts === "string" ? parsed.ts : "",
      state: ensureStateShape(parsed.state)
    };
  } catch (e) {
    console.warn("Miroir Supabase en attente invalide, réinitialisation", e);
    return null;
  }
}

function savePendingSupabaseMirror(nextState) {
  try {
    const payload = {
      ts: new Date().toISOString(),
      state: createBackupStateSnapshot(nextState)
    };
    localStorage.setItem(SUPABASE_MIRROR_PENDING_KEY, JSON.stringify(payload));
  } catch (e) {
    console.warn("Impossible de mémoriser le miroir Supabase en attente", e);
  }
}

function clearPendingSupabaseMirror() {
  try {
    localStorage.removeItem(SUPABASE_MIRROR_PENDING_KEY);
  } catch (e) {
    console.warn("Impossible de nettoyer le miroir Supabase en attente", e);
  }
}

function openEmployeeModal() {
  if (!appContext.canEdit) {
    return;
  }
  editingEmployeeIndex = -1;
  employeeName.value = "";
  employeeTeam.value = "N1";
  employeeHireDate.value = "";
  addEmployeeBtn.style.display = "block";
  updateEmployeeBtn.style.display = "none";
  cancelEditBtn.style.display = "none";
  renderEmployeeList();
  employeeModal.style.display = "flex";
  employeeName.focus();
}

function closeEmployeeModal() {
  employeeModal.style.display = "none";
  editingEmployeeIndex = -1;
}

function renderEmployeeList() {
  employeeListContainer.innerHTML = "";
  for (let i = 0; i < employees.length; i++) {
    const emp = employees[i];
    const div = document.createElement("div");
    div.className = "employee-item";
    div.innerHTML = `
      <div class="employee-info">
        <div class="employee-name">${emp.name}</div>
        <div class="employee-team">Support ${emp.team}${emp.hireDate ? " • Embauche " + formatDateFr(emp.hireDate) : ""}</div>
      </div>
      <div class="employee-actions">
        <button type="button" data-index="${i}">Modifier</button>
        <button type="button" class="delete" data-index="${i}">Supprimer</button>
      </div>
    `;
    const editBtn = div.querySelector("button:first-of-type");
    const delBtn = div.querySelector("button.delete");
    editBtn.addEventListener("click", () => editEmployee(i));
    delBtn.addEventListener("click", () => deleteEmployee(i));
    employeeListContainer.appendChild(div);
  }
}

function editEmployee(index) {
  if (!appContext.canEdit) {
    return;
  }
  editingEmployeeIndex = index;
  const emp = employees[index];
  employeeName.value = emp.name;
  employeeTeam.value = emp.team;
  employeeHireDate.value = emp.hireDate || "";
  addEmployeeBtn.style.display = "none";
  updateEmployeeBtn.style.display = "block";
  cancelEditBtn.style.display = "block";
  employeeName.focus();
  employeeName.select();
}

function cancelEmployeeEdit() {
  editingEmployeeIndex = -1;
  employeeName.value = "";
  employeeTeam.value = "N1";
  employeeHireDate.value = "";
  addEmployeeBtn.style.display = "block";
  updateEmployeeBtn.style.display = "none";
  cancelEditBtn.style.display = "none";
  employeeName.focus();
}

function addOrUpdateEmployee() {
  if (!appContext.canEdit) {
    return;
  }
  const name = employeeName.value.trim();
  const team = employeeTeam.value;
  const hireDate = normalizeHireDate(employeeHireDate.value);

  if (!name) {
    alert("Veuillez entrer un nom");
    return;
  }

  if (editingEmployeeIndex >= 0) {
    const oldName = employees[editingEmployeeIndex].name;
    employees[editingEmployeeIndex].name = name;
    employees[editingEmployeeIndex].team = team;
    employees[editingEmployeeIndex].hireDate = hireDate;

    if (oldName !== name && state.data[oldName]) {
      state.data[name] = state.data[oldName];
      delete state.data[oldName];
      if (state.initialBalances[oldName]) {
        state.initialBalances[name] = state.initialBalances[oldName];
        delete state.initialBalances[oldName];
      }
    }
    editingEmployeeIndex = -1;
  } else {
    const exists = employees.some((e) => e.name === name);
    if (exists) {
      alert("Ce collaborateur existe déjà");
      return;
    }
    employees.push({ name, team, hireDate });
  }

  sortEmployeesByTeamAndFirstName();
  saveEmployeesToStorage();

  const employeeNames = employees.map((e) => e.name);
  const newState = createEmptyState();
  for (const empName of employeeNames) {
    if (state.data[empName]) {
      newState.data[empName] = { ...state.data[empName] };
    }
    if (state.initialBalances[empName]) {
      newState.initialBalances[empName] = { ...state.initialBalances[empName] };
    }
  }
  state = newState;
  state.employees = employees.map((e) => ({ ...e }));
  void persistSnapshot();

  employeeName.value = "";
  employeeTeam.value = "N1";
  employeeHireDate.value = "";
  addEmployeeBtn.style.display = "block";
  updateEmployeeBtn.style.display = "none";
  cancelEditBtn.style.display = "none";
  renderEmployeeList();
  renderPlanning();
  renderAnnual();
}

function deleteEmployee(index) {
  if (!appContext.canEdit) {
    return;
  }
  const emp = employees[index];
  const isConfirmed = window.confirm(`Êtes-vous sûr de vouloir supprimer ${emp.name} ?`);
  if (!isConfirmed) {
    return;
  }

  const name = emp.name;
  employees.splice(index, 1);
  sortEmployeesByTeamAndFirstName();
  saveEmployeesToStorage();

  if (state.data[name]) {
    delete state.data[name];
  }
  if (state.initialBalances[name]) {
    delete state.initialBalances[name];
  }
  state.employees = employees.map((e) => ({ ...e }));
  void persistSnapshot();

  renderEmployeeList();
  renderPlanning();
  renderAnnual();
}

function createLocalProvider() {
  return {
    mode: "local",
    canEdit: true,
    currentUser: "",
    async loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          return ensureStateShape(JSON.parse(raw));
        } catch (err) {
          console.warn("État local invalide, réinitialisation", err);
        }
      }
      const backup = loadLatestBackupState();
      if (backup) {
        return backup;
      }
      return createEmptyState();
    },
    async saveSnapshot(nextState) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
    }
  };
}

async function createDataProvider() {
  if (detectSupabaseContext()) {
    try {
      return await createSupabaseProvider();
    } catch (error) {
      console.warn("Supabase indisponible, repli JSONbin", error);
    }
  }

  if (detectJsonbinContext()) {
    try {
      return await createJsonbinProvider();
    } catch (error) {
      console.warn("JSONbin indisponible, repli local", error);
    }
  }

  return createLocalProvider();
}

function detectSupabaseContext() {
  return Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
}

async function createSupabaseProvider() {
  const fallbackJsonbinProvider = detectJsonbinContext() ? await createJsonbinProvider() : null;
  const baseUrl = SUPABASE_URL.replace(/\/$/, "");
  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
    Accept: "application/json"
  };

  const readFallback = async (reason) => {
    if (!fallbackJsonbinProvider) {
      throw reason instanceof Error ? reason : new Error(String(reason || "Supabase indisponible"));
    }
    console.warn("Supabase indisponible, lecture depuis JSONbin", reason);
    return fallbackJsonbinProvider.loadState();
  };

  const writeFallback = async (snapshot, reason) => {
    if (!fallbackJsonbinProvider) {
      throw reason instanceof Error ? reason : new Error(String(reason || "Supabase indisponible"));
    }
    console.warn("Supabase indisponible, écriture vers JSONbin", reason);
    await fallbackJsonbinProvider.saveSnapshot(snapshot);
  };

  const upsertSupabaseState = async (snapshotState) => {
    const response = await fetch(`${baseUrl}/rest/v1/${SUPABASE_TABLE}?on_conflict=id`, {
      method: "POST",
      headers: {
        ...headers,
        Prefer: "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({ id: SUPABASE_ROW_ID, state: snapshotState })
    });

    if (!response.ok) {
      throw new Error(`Supabase PUT échoué (${response.status})`);
    }
  };

  const mirrorToJsonbinBestEffort = async (snapshotState, label) => {
    if (!fallbackJsonbinProvider) {
      return;
    }
    try {
      const mirrorState = cloneState(snapshotState);
      appendSharedBackup(mirrorState, label || "miroir Supabase");
      await fallbackJsonbinProvider.saveSnapshot(mirrorState);
    } catch (error) {
      console.warn("Miroir JSONbin impossible", error);
    }
  };

  return {
    mode: "supabase",
    canEdit: !!editorKey,
    currentUser: "",
    async loadState() {
      try {
        const url = `${baseUrl}/rest/v1/${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}&select=state`;
        const response = await fetch(url, { method: "GET", headers, cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Supabase GET échoué (${response.status})`);
        }
        const rows = await response.json();
        const payload = rows?.[0]?.state;
        if (!payload) {
          return createEmptyState();
        }
        if (!hasUsableSharedData(payload) && Array.isArray(payload.backups)) {
          const backups = normalizeBackupEntries(payload.backups);
          if (backups.length > 0) {
            const restored = ensureStateShape(backups[0].state);
            return restored;
          }
        }

        const remoteState = ensureStateShape(payload);
        const pendingMirror = loadPendingSupabaseMirror();
        if (!pendingMirror?.state) {
          return remoteState;
        }

        try {
          const pendingState = cloneState(pendingMirror.state);
          appendSharedBackup(pendingState, "rattrapage Supabase après coupure");
          await upsertSupabaseState(pendingState);
          await mirrorToJsonbinBestEffort(pendingState, "miroir rattrapage Supabase");
          clearPendingSupabaseMirror();
          return ensureStateShape(pendingState);
        } catch (replayError) {
          console.warn("Rattrapage Supabase impossible, miroir conservé", replayError);
          return remoteState;
        }
      } catch (error) {
        return readFallback(error);
      }
    },
    async saveSnapshot(nextState) {
      if (!editorKey) {
        appContext.canEdit = false;
        syncUiState();
        throw new Error("Clé d'édition requise pour modifier les données");
      }

      try {
        const snapshotState = cloneState(nextState);
        appendSharedBackup(snapshotState, "sauvegarde Supabase");
        await upsertSupabaseState(snapshotState);
        clearPendingSupabaseMirror();
        await mirrorToJsonbinBestEffort(snapshotState, "miroir Supabase");
      } catch (error) {
        const snapshotState = cloneState(nextState);
        appendSharedBackup(snapshotState, "sauvegarde secours JSONbin");
        savePendingSupabaseMirror(snapshotState);
        await writeFallback(snapshotState, error);
      }
    }
  };
}

async function createJsonbinProvider() {
  const provider = {
    mode: "jsonbin",
    canEdit: !!editorKey,
    currentUser: "",
    async loadState() {
      const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
      const headers = { "X-Bin-Meta": "false", "Cache-Control": "no-cache" };
      if (editorKey) {
        headers["X-Master-Key"] = editorKey;
      } else if (JSONBIN_ACCESS_KEY) {
        headers["X-Access-Key"] = JSONBIN_ACCESS_KEY;
      }
      const response = await fetch(url, { method: "GET", headers, cache: "no-store" });

      if (!response.ok) {
        throw new Error(`JSONbin GET échoué (${response.status})`);
      }

      const payload = await response.json();
      if (!payload?.state) {
        return createEmptyState();
      }
      if (!hasUsableSharedData(payload.state)) {
        const backups = normalizeBackupEntries(payload.state.backups);
        if (backups.length > 0) {
          return ensureStateShape(backups[0].state);
        }
      }
      return ensureStateShape(payload.state);
    },
    async saveSnapshot(nextState) {
      if (!editorKey) {
        appContext.canEdit = false;
        syncUiState();
        throw new Error("Clé d'édition requise pour modifier les données");
      }
      const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
      const response = await fetch(url, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": editorKey
        },
        body: JSON.stringify({ state: nextState })
      });

      if (response.status === 401 || response.status === 403) {
        appContext.canEdit = false;
        syncUiState();
        throw new Error("Clé d'édition invalide : passage en mode lecture seule");
      }

      if (!response.ok) {
        throw new Error(`JSONbin PUT échoué (${response.status})`);
      }
    }
  };

  await provider.loadState();
  return provider;
}

async function persistSnapshot() {
  const localSnapshot = cloneState(state);
  const persistId = ++appContext.latestPersistId;

  // Sérialise les écritures pour éviter les races et garantit que chaque PUT
  // est précédé d'un GET frais sur lequel on ré-applique uniquement nos
  // modifications locales (anti-écrasement « last write wins »).
  appContext.pendingPersist = appContext.pendingPersist
    .catch(() => {})
    .then(() => doPersistSnapshot(localSnapshot, persistId));
  return appContext.pendingPersist;
}

async function doPersistSnapshot(localState, persistId) {
  const provider = appContext.provider;
  if (!provider) return;

  const isLatestPersist = () => persistId === appContext.latestPersistId;

  // Mode local: pas de fusion nécessaire, on écrit directement.
  if (provider.mode !== "jsonbin") {
    await provider.saveSnapshot(localState);
    appContext.baseState = cloneState(localState);
    saveBackupSnapshot(localState, "sauvegarde locale");
    if (isLatestPersist()) {
      state = cloneState(localState);
      saveCachedSharedState(state);
    }
    return;
  }

  // Mode partagé: GET frais, fusion des modifs locales par-dessus, PUT.
  let remote;
  try {
    remote = await provider.loadState();
  } catch (error) {
    console.warn("GET pré-PUT impossible, envoi sans fusion", error);
    await provider.saveSnapshot(localState);
    appContext.baseState = cloneState(localState);
    saveBackupSnapshot(localState, "sauvegarde secours JSONbin");
    if (isLatestPersist()) {
      state = cloneState(localState);
      saveCachedSharedState(state);
      renderPlanning();
      renderAnnual();
    }
    return;
  }

  const base = appContext.baseState || cloneState(remote);
  const merged = mergeStates(remote, base, localState);
  appendSharedBackup(merged, "sauvegarde JSONbin");

  await provider.saveSnapshot(merged);
  appContext.baseState = cloneState(merged);
  saveBackupSnapshot(merged, "sauvegarde JSONbin");
  if (isLatestPersist()) {
    state = merged;
    saveCachedSharedState(state);
    renderPlanning();
    renderAnnual();
  }
}

function cloneState(s) {
  return JSON.parse(JSON.stringify(s));
}

// Fusionne les modifications locales (diff entre `base` et `local`) sur l'état
// `remote` récemment récupéré. Les modifications faites par d'autres éditeurs
// pendant ce temps sur des cellules différentes sont conservées.
function mergeStates(remote, base, local) {
  const result = cloneState(remote);
  const localHireDateByName = new Map(
    (local.employees || [])
      .filter((e) => e && typeof e.name === "string")
      .map((e) => [e.name, normalizeHireDate(e.hireDate)])
  );
  const baseHireDateByName = new Map(
    (base.employees || [])
      .filter((e) => e && typeof e.name === "string")
      .map((e) => [e.name, normalizeHireDate(e.hireDate)])
  );

  // Liste des collaborateurs : si elle a changé localement (ajout / suppression /
  // renommage / changement d'équipe), on adopte la version locale.
  const localEmps = JSON.stringify(local.employees || []);
  const baseEmps = JSON.stringify(base.employees || []);
  if (localEmps !== baseEmps) {
    result.employees = (local.employees || []).map((e) => ({ ...e }));
  }
  const mergedEmployees = ((result.employees && result.employees.length > 0)
    ? result.employees
    : employees)
    .filter((e) => e && typeof e.name === "string" && e.name.trim())
    .map((e) => {
      const name = e.name.trim();
      return {
        name,
        team: e.team === "N2" ? "N2" : "N1",
        hireDate: normalizeHireDate(e.hireDate) || localHireDateByName.get(name) || baseHireDateByName.get(name) || ""
      };
    });
  result.employees = mergedEmployees;
  const effectiveEmployees = mergedEmployees;

  for (const employee of effectiveEmployees) {
    const name = employee.name;
    if (!result.data[name]) result.data[name] = {};
    if (!result.initialBalances[name]) {
      const teamInitial = defaultInitialByTeam[employee.team] || defaultInitialByTeam.N1;
      result.initialBalances[name] = { ...teamInitial };
    }

    // Données journalières
    for (const month of monthDefs) {
      const monthKey = month.key;
      const localMonth = local.data?.[name]?.[monthKey] || {};
      const baseMonth = base.data?.[name]?.[monthKey] || {};
      if (!result.data[name][monthKey]) result.data[name][monthKey] = {};
      const targetMonth = result.data[name][monthKey];

      // Cellules ajoutées ou modifiées localement
      for (const day of Object.keys(localMonth)) {
        if (localMonth[day] !== baseMonth[day]) {
          targetMonth[day] = localMonth[day];
        }
      }
      // Cellules supprimées localement
      for (const day of Object.keys(baseMonth)) {
        if (!(day in localMonth)) {
          delete targetMonth[day];
        }
      }
    }

    // Soldes initiaux
    const localBal = local.initialBalances?.[name];
    const baseBal = base.initialBalances?.[name];
    if (localBal && baseBal) {
      if (!result.initialBalances[name]) result.initialBalances[name] = {};
      for (const key of ["CP", "RTT", "FR", "reliquatCP", "reliquatRTT"]) {
        if (localBal[key] !== baseBal[key]) {
          result.initialBalances[name][key] = localBal[key];
        }
      }
    }
  }

  return result;
}

function startBackgroundSync() {
  if (appContext.provider?.mode !== "jsonbin") {
    return;
  }

  // Pas de polling: les lecteurs récupèrent les données au chargement et
  // à chaque retour sur l'onglet. Les éditeurs n'envoient que des PUT
  // lors de leurs modifications (pas de GET en arrière-plan).
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && !appContext.canEdit) {
      void refreshStateFromSharedStore();
    }
  });
}

async function refreshStateFromSharedStore() {
  if (appContext.provider?.mode !== "jsonbin") {
    return;
  }

  try {
    const next = await appContext.provider.loadState();
    const currentSerialized = JSON.stringify(state);
    const nextSerialized = JSON.stringify(next);
    if (currentSerialized === nextSerialized) {
      appContext.baseState = cloneState(next);
      return;
    }

    state = next;
    appContext.baseState = cloneState(next);
    saveCachedSharedState(state);
    renderPlanning();
    renderAnnual();
  } catch (error) {
    console.warn("Synchronisation JSONbin impossible", error);
  }
}

function resolvePickerCode(baseCode, durationKey) {
  if (!baseCode) {
    return "";
  }

  if (durationKey === "day") {
    return baseCode;
  }

  const halfCodeByBase = {
    CP: { am: "CPm", pm: "CPam" },
    CPp: { am: "CPpm", pm: "CPpam" },
    RTT: { am: "RTTm", pm: "RTTam" },
    RTTp: { am: "RTTpm", pm: "RTTpam" },
    CSS: { am: "CSSm", pm: "CSSam" },
    FAM: { am: "FAMm", pm: "FAMam" },
    FR: { am: "FRm", pm: "FRam" },
    PM: { am: "PMm", pm: "PMam" },
    MAL: { am: "MALm", pm: "MALam" },
    DIV: { am: "DIVm", pm: "DIVam" },
    RC: { am: "RCm", pm: "RCam" }
  };

  const mapping = halfCodeByBase[baseCode];
  if (mapping && mapping[durationKey]) {
    return mapping[durationKey];
  }

  return baseCode;
}

function isAfternoonCode(code) {
  return typeof code === "string" && code.endsWith("am");
}

function isMorningCode(code) {
  return typeof code === "string" && code.endsWith("m") && !code.endsWith("am");
}

function isHalfDayCode(code) {
  return isMorningCode(code) || isAfternoonCode(code);
}

function isCompositeDayCode(value) {
  return typeof value === "string" && value.includes("+");
}

function splitDayCodes(value) {
  if (!value || typeof value !== "string") {
    return [];
  }
  if (value.includes("+")) {
    return value
      .split("+")
      .map((item) => item.trim())
      .filter(Boolean);
  }
  return [value];
}

function getBaseCode(code) {
  if (!code) return "";
  if (isAfternoonCode(code)) return code.slice(0, -2);
  if (isMorningCode(code)) return code.slice(0, -1);
  return code;
}

function dayCodeToHalfMap(value) {
  const halves = { am: "", pm: "" };
  for (const code of splitDayCodes(value)) {
    if (isMorningCode(code)) {
      halves.am = code;
      continue;
    }
    if (isAfternoonCode(code)) {
      halves.pm = code;
      continue;
    }
    const base = getBaseCode(code);
    halves.am = resolvePickerCode(base, "am");
    halves.pm = resolvePickerCode(base, "pm");
  }
  return halves;
}

function composeDayValue(halves) {
  const amCode = halves.am || "";
  const pmCode = halves.pm || "";

  if (amCode && pmCode) {
    const baseAm = getBaseCode(amCode);
    const basePm = getBaseCode(pmCode);
    if (
      baseAm &&
      baseAm === basePm &&
      amCode === resolvePickerCode(baseAm, "am") &&
      pmCode === resolvePickerCode(baseAm, "pm")
    ) {
      return baseAm;
    }
    return `${amCode}+${pmCode}`;
  }

  if (amCode) return amCode;
  if (pmCode) return pmCode;
  return "";
}

function setDayCodeValue(currentValue, code, durationKey) {
  if (!code) {
    return "";
  }
  if (durationKey === "day") {
    return code;
  }

  const halves = dayCodeToHalfMap(currentValue);
  if (durationKey === "am") {
    halves.am = code;
  } else if (durationKey === "pm") {
    halves.pm = code;
  }
  return composeDayValue(halves);
}

function setupPicker() {

      const code = resolvePickerCode(type.baseCode, durationKey);
      const mode = picker.dataset.mode || "single";

      if (mode === "range") {
        const startDay = Number(picker.dataset.rangeStartDay || "0");
        const endDay = Number(picker.dataset.rangeEndDay || "0");
        const onlyWorkingDays = picker.dataset.rangeWorkingDaysOnly === "1";
        if (startDay > 0 && endDay > 0) {
          applyCodeToRange(empName, startDay, endDay, code, onlyWorkingDays, durationKey);
        }
      } else {
        const day = picker.dataset.day;
        const currentValue = state.data[empName][selectedMonth][day] || "";
        const nextValue = setDayCodeValue(currentValue, code, durationKey);
        if (!nextValue) {
          delete state.data[empName][selectedMonth][day];
        } else {
          state.data[empName][selectedMonth][day] = nextValue;
        }
      }

      void persistSnapshot();
      clearRangeSelection();
      closePicker();
      renderPlanning();
      renderAnnual();
    });

  picker.appendChild(typeWrap);
}

function openPicker(td, name, day, options = {}) {
  if (!appContext.canEdit) {
    return;
  }
  const picker = document.getElementById("codePicker");
  picker.dataset.name = name;
  picker.dataset.day = String(day);
  picker.dataset.mode = options.mode || "single";
  picker.dataset.rangeStartDay = options.rangeStartDay ? String(options.rangeStartDay) : "";
  picker.dataset.rangeEndDay = options.rangeEndDay ? String(options.rangeEndDay) : "";
  picker.dataset.rangeWorkingDaysOnly = options.rangeWorkingDaysOnly ? "1" : "0";
  picker.dataset.duration = "day";
  picker.querySelectorAll(".picker-duration-btn").forEach((el) => {
    const isDay = el.textContent === "Journée";
    el.classList.toggle("active", isDay);
  });
  const rect = td.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 2;
  picker.style.display = "block";
  const pw = picker.offsetWidth || 280;
  const ph = picker.offsetHeight || 200;
  
  // Gestion du débordement horizontal (à droite)
  if (left + pw > window.innerWidth - 8) {
    left = window.innerWidth - pw - 8;
  }
  
  // Gestion du débordement vertical (bas/haut)
  const bottomSpace = window.innerHeight - rect.bottom;
  const topSpace = rect.top;
  
  if (bottomSpace < ph + 8) {
    // Pas assez d'espace en bas, placer au-dessus
    if (topSpace > ph + 8) {
      top = rect.top + window.scrollY - ph - 2;
    }
    // Si pas assez d'espace en haut non plus, garder en bas mais scrollable
  }
  
  picker.style.left = left + "px";
  picker.style.top = top + "px";
}

function closePicker() {
  const picker = document.getElementById("codePicker");
  if (picker) picker.style.display = "none";
}

function applyCodeToRange(name, startDay, endDay, code, onlyWorkingDays, durationKey = "day") {
  const [yearText, monthText] = selectedMonth.split("-");
  const year = Number(yearText);
  const monthIndex = Number(monthText) - 1;
  const from = Math.min(startDay, endDay);
  const to = Math.max(startDay, endDay);

  for (let day = from; day <= to; day += 1) {
    const date = new Date(year, monthIndex, day);
    const dayType = getDayType(date);
    if (onlyWorkingDays && !dayType.isWorkingDay) {
      continue;
    }
    const dayKey = String(day);
    const currentValue = state.data[name][selectedMonth][dayKey] || "";
    const nextValue = setDayCodeValue(currentValue, code, durationKey);
    if (!nextValue) {
      delete state.data[name][selectedMonth][dayKey];
    } else {
      state.data[name][selectedMonth][dayKey] = nextValue;
    }
  }
}

function getDisplayLabel(baseCode) {
  if (baseCode === "CPp") return "CP";
  if (baseCode === "RTTp") return "RTT";
  return baseCode;
}

              rangeSelection.startDay = day;

            const endDay = day;

              mode: "range",
              rangeStartDay: startDay,
              rangeEndDay: endDay,
              rangeWorkingDaysOnly: !allowAllDays
            });
          });
          td.addEventListener("mouseenter", () => {
            if (!rangeMode) return;
            if (rangeSelection.startName !== name) return;
            if (!Number.isInteger(rangeSelection.startDay)) return;
            if (rangeSelection.hoverDay === day) return;
            rangeSelection.hoverDay = day;
            renderPlanning();
          });
          td.style.cursor = appContext.canEdit ? "pointer" : "default";
        } else {
          td.style.cursor = "default";
        }
        tr.appendChild(td);
      }

      appendTotalsCells(tr);
      updateTotalsForRow(tr, name);
      tbody.appendChild(tr);
    }

    const teamPresenceRow = createPresenceRow(teamMembers, selectedMonth, year, monthIndex, days, `Présents ${team}`, todayDay);
    tbody.appendChild(teamPresenceRow);

  }

  if (presenceRows.length >= 2) {
    const penultimatePresence = presenceRows[presenceRows.length - 2].querySelector("td.presence-end");

    if (penultimatePresence && lastPresence) {
      penultimatePresence.rowSpan = 2;

    }
  }

  planningTable.appendChild(tbody);
}

function computeMonthTotals(name, monthKey) {
  const totals = { CP: 0, RTT: 0, CSS: 0, FAM: 0, FR: 0, PM: 0, MAL: 0, RC: 0, DIV: 0 };
  const cells = state.data[name][monthKey];

  for (const value of Object.values(cells)) {
    for (const code of splitDayCodes(value)) {
      if (!code || !codeToWeight[code]) continue;
      const weight = codeToWeight[code];
      for (const [bucket, amount] of Object.entries(weight)) {
        totals[bucket] += amount;
      }
    }
  }
  return totals;
}

function updateTotalsForRow(row, name) {
  const totals = computeMonthTotals(name, selectedMonth);
  for (const [bucket, amount] of Object.entries(totals)) {
    const td = row.querySelector(`[data-total="${bucket}"]`);
    if (td) td.textContent = String(amount);
  }
}

function computeAnnualTotals(name) {
  const annual = { CP: 0, RTT: 0, FR: 0, CSS: 0, FAM: 0, PM: 0, MAL: 0, RC: 0, DIV: 0 };
  for (const month of monthDefs) {
    const monthly = computeMonthTotals(name, month.key);
    for (const key of Object.keys(annual)) {
      annual[key] += monthly[key];
    }
  }
  return annual;
}

        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="reliquatCP" data-employee="${name}" value="${initial.reliquatCP}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="reliquatRTT" data-employee="${name}" value="${initial.reliquatRTT}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="CP" data-employee="${name}" value="${initial.CP}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="RTT" data-employee="${name}" value="${initial.RTT}" ${disabledAttr}></td>
        <td><input class="initial-input" type="number" step="0.5" min="0" data-initial="FR" data-employee="${name}" value="${initial.FR}" ${disabledAttr}></td>
        <td>${round2(initial.reliquatCP + initial.CP + seniorityCpDays - a.CP)}</td>
        <td>${round2(initial.reliquatRTT + initial.RTT - a.RTT)}</td>
        <td>${round2(initial.FR - a.FR)}</td>
        <td>${a.CP}</td>
        <td>${a.RTT}</td>
        <td>${a.FR}</td>
        <td>${a.CSS}</td>
        <td>${a.FAM}</td>
        <td>${a.PM}</td>
        <td>${a.MAL}</td>
        <td>${a.RC}</td>
        <td>${a.DIV}</td>
      `;

      tr.querySelectorAll("[data-initial]").forEach((input) => {
        input.addEventListener("change", (event) => {
          if (!appContext.canEdit) return;
          const key = event.target.dataset.initial;
          const employeeName = event.target.dataset.employee;
          const parsed = Number(event.target.value);
          state.initialBalances[employeeName][key] = Number.isFinite(parsed) ? parsed : 0;
          void persistSnapshot();
          renderPlanning();
          renderAnnual();
        });
      });

      tbody.appendChild(tr);
    }

    const teamSummary = computeAnnualSummary(teamMembers);
    tbody.appendChild(createAnnualTotalRow(`Total ${team}`, teamSummary));
  }

  const supportSummary = computeAnnualSummary(employees);
  tbody.appendChild(createAnnualTotalRow("Total Support", supportSummary));

  annualTable.appendChild(tbody);
}

function round2(n) {
  return Math.round(n * 100) / 100;
}

function getDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDayType(date) {
  const dow = date.getDay();
  const isSaturday = dow === 6;
  const isSunday = dow === 0;
  const dateKey = getDateKey(date);
  const holidayName = holidays[dateKey] || "";
  const isHoliday = Boolean(holidayName);

  const classes = [];
  if (isSaturday) classes.push("saturday");
  if (isSunday) classes.push("sunday");
  if (isHoliday) classes.push("holiday");

  const titleParts = [];
  if (isSaturday) titleParts.push("Samedi");
  if (isSunday) titleParts.push("Dimanche");
  if (isHoliday) titleParts.push(`Férié: ${holidayName}`);

  return {
    isSaturday,
    isSunday,
    isHoliday,
    isWorkingDay: !isSaturday && !isSunday && !isHoliday,
    headerClass: classes.join(" "),
    title: titleParts.join(" | ")
  };
}

function getDaysInMonth(year, monthIndex) {
  return new Date(year, monthIndex + 1, 0).getDate();
}

function getIsoWeekNumber(date) {
  const utcDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = utcDate.getUTCDay() || 7;
  utcDate.setUTCDate(utcDate.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 1));
  return Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);
}

function normalizeHireDate(value) {
  if (!value || typeof value !== "string") {
    return "";
  }
  const trimmed = value.trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
    return "";
  }
  const [y, m, d] = trimmed.split("-").map(Number);
  const parsed = new Date(Date.UTC(y, m - 1, d));
  if (parsed.getUTCFullYear() !== y || parsed.getUTCMonth() !== m - 1 || parsed.getUTCDate() !== d) {
    return "";
  }
  return trimmed;
}

function formatDateFr(isoDate) {
  const normalized = normalizeHireDate(isoDate);
  if (!normalized) {
    return "";
  }
  const [y, m, d] = normalized.split("-");
  return `${d}/${m}/${y}`;
}

function getSeniorityReferenceDate() {
  const firstMonth = monthDefs[0]?.key;
  if (!firstMonth) {
    return new Date();
  }
  const [yearText, monthText] = firstMonth.split("-");
  const year = Number(yearText);
  const monthIndex = Number(monthText) - 1;
  return new Date(year, monthIndex, 0);
}

function getFullYearsBetween(startIso, endDate) {
  const normalized = normalizeHireDate(startIso);
  if (!normalized) {
    return 0;
  }
  const [y, m, d] = normalized.split("-").map(Number);
  const start = new Date(y, m - 1, d);
  let years = endDate.getFullYear() - start.getFullYear();
  const hasAnniversaryPassed =
    endDate.getMonth() > start.getMonth() ||
    (endDate.getMonth() === start.getMonth() && endDate.getDate() >= start.getDate());
  if (!hasAnniversaryPassed) {
    years -= 1;
  }
  return Math.max(0, years);
}

function computeSyntecAdditionalCpDays(seniorityYears) {
  if (seniorityYears >= 20) return 4;
  if (seniorityYears >= 15) return 3;
  if (seniorityYears >= 10) return 2;
  if (seniorityYears >= 5) return 1;
  return 0;
}

function createEmptyState() {
  const data = {};
  const initialBalances = {};
  for (const employee of employees) {
    const name = employee.name;
    const teamInitial = defaultInitialByTeam[employee.team] || defaultInitialByTeam.N1;
    data[name] = {};
    initialBalances[name] = { ...teamInitial };
    for (const month of monthDefs) {
      data[name][month.key] = {};
    }
  }
  return { data, initialBalances, employees: employees.map((e) => ({ ...e })), backups: [] };
}

function ensureStateShape(input) {
  // Si l'état distant contient une liste de collaborateurs, on l'adopte
  // comme source de vérité avant de construire la structure data/balances.
  if (input && typeof input === "object" && Array.isArray(input.employees) && input.employees.length > 0) {
    const currentHireDateByName = new Map(
      employees
        .filter((e) => e && typeof e.name === "string")
        .map((e) => [e.name, normalizeHireDate(e.hireDate)])
    );
    const cleaned = input.employees
      .filter((e) => e && typeof e.name === "string" && e.name.trim())
      .map((e) => ({
        name: e.name.trim(),
        team: e.team === "N2" ? "N2" : "N1",
        hireDate: normalizeHireDate(e.hireDate) || currentHireDateByName.get(e.name.trim()) || ""
      }));
    if (cleaned.length > 0) {
      employees.length = 0;
      employees.push(...cleaned);
      sortEmployeesByTeamAndFirstName();
      saveEmployeesToStorage();
    }
  }

  const next = createEmptyState();
  if (!input || typeof input !== "object" || !input.data) {
    if (input && typeof input === "object") {
      next.backups = normalizeBackupEntries(input.backups);
    }
    return next;
  }

  for (const employee of employees) {
    const name = employee.name;
    if (!input.data[name]) {
      continue;
    }
    for (const month of monthDefs) {
      const monthData = input.data[name][month.key];
      if (!monthData || typeof monthData !== "object") {
        continue;
      }
      next.data[name][month.key] = { ...monthData };
    }

    if (input.initialBalances && input.initialBalances[name]) {
      const src = input.initialBalances[name];
      if (typeof src.CP === "number") {
        next.initialBalances[name].CP = src.CP;
      }
      if (typeof src.reliquatCP === "number") {
        next.initialBalances[name].reliquatCP = src.reliquatCP;
      }
      if (typeof src.reliquatRTT === "number") {
        next.initialBalances[name].reliquatRTT = src.reliquatRTT;
      }
      if (typeof src.RTT === "number") {
        next.initialBalances[name].RTT = src.RTT;
      }
      if (typeof src.FR === "number") {
        next.initialBalances[name].FR = src.FR;
      }
    }
  }
  next.backups = normalizeBackupEntries(input.backups);
  return next;
}

function renderLegend() {
  legend.innerHTML = "";
  const baseCodes = codes.filter((c) => c.code && !c.code.endsWith("m"));
  for (const entry of baseCodes) {
    const item = document.createElement("div");
    item.className = "legend-item";

    const badge = document.createElement("span");
    badge.className = "legend-badge";
    const colorClass = codeColorClass[entry.code];
    if (colorClass) badge.classList.add(colorClass);
    badge.textContent = getDisplayLabel(entry.code);

    const label = document.createElement("span");
    label.className = "legend-label";
    label.textContent = entry.label;

    item.appendChild(badge);
    item.appendChild(label);
    legend.appendChild(item);
  }
}

function renderMonthSelect() {
  monthSelect.innerHTML = "";
  for (const month of monthDefs) {
    const option = document.createElement("option");
    option.value = month.key;
    option.textContent = month.label;
    monthSelect.appendChild(option);
  }
  monthSelect.value = selectedMonth;
}
